<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Frenemies on the Road</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#15161a">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
<style>
:root{
  --asfalto:#15161a; --notte:#1f2128; --pannello:#262932; --bordo:#3a3e4a;
  --osso:#efe9dc; --grigio:#9a9483; --mezzeria:#f5a623; --faro:#ffd23f;
  --cuori:#e4572e; --picche:#d8d3c8; --quadri:#4f7cac; --fiori:#6a994e;
  --r:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:var(--asfalto);color:var(--osso);font-family:'IBM Plex Sans',sans-serif;font-size:16px;line-height:1.5;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}

header{
  flex:0 0 auto;padding:10px 16px 8px;border-bottom:3px solid var(--mezzeria);
  background:repeating-linear-gradient(90deg,transparent 0 34px,rgba(245,166,35,.12) 34px 58px),var(--asfalto);
  display:flex;align-items:center;justify-content:space-between;gap:10px;
}
header h1{font-family:'Oswald',sans-serif;font-weight:700;font-size:clamp(15px,3vw,21px);letter-spacing:2px;text-transform:uppercase;white-space:nowrap}
header h1 .amp{color:var(--mezzeria)}
#infoScena{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1.5px;color:var(--grigio);text-transform:uppercase;text-align:right;line-height:1.4}
.hbtns{display:flex;gap:8px}
.hbtns button{background:var(--notte);border:1px solid var(--bordo);border-radius:8px;color:var(--osso);font-family:'Oswald',sans-serif;font-size:12px;letter-spacing:1px;text-transform:uppercase;padding:7px 10px;cursor:pointer}

main{flex:1 1 auto;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:calc(16px*var(--k,1));display:flex;flex-direction:column}
#scena-corrente{max-width:980px;margin:0 auto;width:100%;flex:1;display:flex;flex-direction:column}

h2.ts{font-family:'Oswald',sans-serif;font-weight:600;font-size:max(16px,calc(21px*var(--k,1)));letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
p.sotto{color:var(--grigio);font-size:max(12px,calc(14px*var(--k,1)));margin-bottom:calc(14px*var(--k,1))}
.pannello{background:var(--pannello);border:1px solid var(--bordo);border-radius:var(--r);padding:calc(14px*var(--k,1));margin-bottom:calc(12px*var(--k,1))}
.etichetta{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--grigio);display:block;margin-bottom:6px}
input[type=text],textarea{width:100%;background:var(--notte);border:1px solid var(--bordo);border-radius:8px;color:var(--osso);font-family:'IBM Plex Sans',sans-serif;font-size:16px;padding:10px 12px;outline:none}
input:focus,textarea:focus{border-color:var(--mezzeria)}
textarea{resize:vertical;min-height:60px}
.riga2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:600px){.riga2{grid-template-columns:1fr}}

button.azione{
  background:var(--mezzeria);border:none;border-radius:12px;color:#1a1206;
  font-family:'Oswald',sans-serif;font-weight:600;font-size:max(14px,calc(16px*var(--k,1)));letter-spacing:1.5px;text-transform:uppercase;
  padding:calc(14px*var(--k,1)) 24px;cursor:pointer;width:100%;
}
button.azione:disabled{opacity:.35}
button.secondaria{
  background:var(--notte);border:1px solid var(--bordo);border-radius:12px;color:var(--osso);
  font-family:'Oswald',sans-serif;font-size:14px;letter-spacing:1px;text-transform:uppercase;
  padding:11px 18px;cursor:pointer;
}

/* ---------- carte ---------- */
.carta{
  width:calc(62px*var(--k,1));height:calc(88px*var(--k,1));border-radius:9px;border:2px solid var(--bordo);
  background:linear-gradient(160deg,#2c2f3a,#1c1e26);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
  cursor:pointer;flex:0 0 auto;position:relative;transition:transform .12s,border-color .12s,box-shadow .12s;
  user-select:none;
}
.carta .v{font-family:'Oswald',sans-serif;font-size:calc(26px*var(--k,1));font-weight:700;line-height:1}
.carta .s{font-size:calc(19px*var(--k,1));line-height:1}
.carta .fig{font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.5px;color:var(--grigio);text-transform:uppercase}
.carta.cuori .v,.carta.cuori .s{color:var(--cuori)}
.carta.picche .v,.carta.picche .s{color:var(--picche)}
.carta.quadri .v,.carta.quadri .s{color:var(--quadri)}
.carta.fiori .v,.carta.fiori .s{color:var(--fiori)}
.carta.jolly{border-color:var(--faro)}
.carta.jolly .v{color:var(--faro);font-size:calc(17px*var(--k,1));letter-spacing:1px}
.carta.sel{transform:translateY(-8px);border-color:var(--faro);box-shadow:0 6px 18px rgba(255,210,63,.3)}
.carta.evid{border-color:var(--mezzeria);box-shadow:0 0 12px rgba(245,166,35,.35)}
.carta.retro{background:repeating-linear-gradient(45deg,#23262f 0 8px,#1b1d24 8px 16px);}
.carta.retro *{visibility:hidden}
.carta.tappata{transform:rotate(90deg) scale(.85);opacity:.7}
.carta.mini{width:calc(46px*var(--k,1));height:calc(66px*var(--k,1))}
.carta.mini .v{font-size:calc(19px*var(--k,1))}
.carta.mini .s{font-size:calc(14px*var(--k,1))}
.mazzo-carte{display:flex;gap:calc(8px*var(--k,1));flex-wrap:wrap;justify-content:center}

/* ---------- tavolo ---------- */
.tavolo-top{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:calc(8px*var(--k,1));flex-wrap:wrap}
.tot-lato{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1px;text-transform:uppercase}
.tot-lato b{font-family:'Oswald',sans-serif;font-size:max(15px,calc(20px*var(--k,1)));letter-spacing:0;margin-left:6px}
.tot-lato.p b{color:var(--cuori)} .tot-lato.o b{color:var(--quadri)}
#piatto{
  background:radial-gradient(ellipse at center,#23362c 0%,#172019 78%);
  border:1px dashed #3c5044;border-radius:var(--r);
  min-height:calc(120px*var(--k,1));overflow-y:auto;
  padding:calc(14px*var(--k,1));display:flex;gap:calc(8px*var(--k,1));flex-wrap:wrap;align-items:center;align-content:center;justify-content:center;
  margin-bottom:calc(12px*var(--k,1));
}
#piatto .vuoto{color:var(--grigio);font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1.5px;text-transform:uppercase}
.banner{
  border-left:3px solid var(--mezzeria);background:rgba(245,166,35,.07);border-radius:0 8px 8px 0;
  padding:calc(8px*var(--k,1)) 12px;font-size:max(11.5px,calc(13px*var(--k,1)));font-style:italic;margin-bottom:calc(10px*var(--k,1));
}
.banner.scopa{border-left-color:var(--faro);background:rgba(255,210,63,.12);font-weight:600;font-style:normal}
.scena-banner{border:1px solid var(--bordo);border-left:3px solid var(--mezzeria);background:rgba(245,166,35,.05);border-radius:0 8px 8px 0;padding:calc(7px*var(--k,1)) 12px;margin-bottom:calc(10px*var(--k,1))}
.scena-banner .st{font-family:'Oswald',sans-serif;font-weight:600;letter-spacing:.5px;color:var(--osso);font-size:max(13px,calc(15px*var(--k,1)))}
.scena-banner .sp{font-size:max(11px,calc(12.5px*var(--k,1)));color:var(--osso);margin-top:3px;line-height:1.35}
.scena-banner .sp b{color:var(--mezzeria);font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase}
.spinte-mano{display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin-bottom:calc(8px*var(--k,1))}
.spinte-mano .lbl{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--mezzeria)}
.spinta-chip{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--bordo);border-left:3px solid var(--bordo);border-radius:6px;padding:3px 8px;font-size:max(10.5px,calc(12px*var(--k,1)));background:rgba(245,166,35,.05)}
.spinta-chip i{font-style:italic;color:var(--grigio)}
.pannello.png-prot{background:rgba(106,153,78,.16);border-color:#3f5a36}
.pannello.png-opp{background:rgba(228,87,46,.16);border-color:#6e3326}
.mano-area{margin-top:auto}
.mano-titolo{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:calc(8px*var(--k,1))}
.contatori{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--grigio);letter-spacing:1px}
.opzioni{display:flex;gap:8px;flex-wrap:wrap;margin-top:calc(12px*var(--k,1))}
.opzioni button{
  background:var(--notte);border:1px solid var(--mezzeria);border-radius:10px;color:var(--osso);
  font-family:'IBM Plex Sans',sans-serif;font-size:max(12.5px,calc(14px*var(--k,1)));padding:calc(10px*var(--k,1)) 14px;cursor:pointer;
}
.opzioni button.neutra{border-color:var(--bordo)}


/* ---------- velo ---------- */
#velo{
  position:fixed;inset:0;background:var(--asfalto);z-index:50;display:none;
  flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:24px;text-align:center;
}
#velo.attivo{display:flex}
#velo .strada-velo{width:min(420px,80vw);height:6px;background:repeating-linear-gradient(90deg,var(--mezzeria) 0 26px,transparent 26px 48px);border-radius:3px}
#velo h3{font-family:'Oswald',sans-serif;font-size:15px;letter-spacing:3px;text-transform:uppercase;color:var(--grigio)}
#velo .nome{font-family:'Oswald',sans-serif;font-size:clamp(28px,7vw,44px);font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--faro)}
#velo button{max-width:320px}

/* ---------- overlay diario / modali ---------- */
.overlay{position:fixed;inset:0;background:rgba(10,11,14,.92);z-index:40;display:none;overflow-y:auto;padding:20px}
.overlay.attivo{display:block}
.overlay .scatola{max-width:760px;margin:0 auto;background:var(--pannello);border:1px solid var(--bordo);border-radius:var(--r);padding:18px}
.chiudi{float:right;background:none;border:none;color:var(--grigio);font-size:24px;cursor:pointer;line-height:1}
.diario-voce{display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px dashed var(--bordo)}
.diario-voce:last-child{border-bottom:none}
.diario-voce .n{flex:0 0 32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-weight:600;border:2px solid var(--bordo);color:var(--grigio);font-size:14px}
.diario-voce.su .n{border-color:var(--cuori);color:var(--cuori)}
.diario-voce.giu .n{border-color:var(--picche);color:var(--picche)}
.diario-voce .testo b{font-family:'Oswald',sans-serif;letter-spacing:.5px}
.diario-voce .testo span{display:block;font-size:13px;color:var(--grigio)}

/* ---------- mercato ---------- */
.mercato-griglia{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:680px){.mercato-griglia{grid-template-columns:1fr}}
.punti-big{font-family:'Oswald',sans-serif;font-size:32px;font-weight:700;color:var(--faro)}
.fig-riga{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:7px 0;border-bottom:1px dashed var(--bordo);flex-wrap:wrap}
.fig-riga:last-child{border-bottom:none}
.fig-riga .desc{font-size:13px}
.fig-riga .desc b{font-family:'Oswald',sans-serif;letter-spacing:.5px}
.fig-riga .desc small{display:block;color:var(--grigio);font-size:11.5px}
.fig-esaurita{opacity:.45;padding:0 6px;align-self:center}
.ia-nascosta{display:none}
#iaBadge{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);background:#1a1206;color:var(--mezzeria);border:1px solid var(--mezzeria);border-radius:20px;padding:7px 16px;font-size:13px;z-index:60;display:none;letter-spacing:.5px}
.compra{display:flex;gap:6px}
.compra button{background:var(--notte);border:1px solid var(--mezzeria);border-radius:8px;color:var(--osso);font-size:15px;padding:7px 11px;cursor:pointer}
.compra button:disabled{opacity:.3;border-color:var(--bordo)}

.cartellone{border:3px solid var(--mezzeria);border-radius:var(--r);padding:16px;text-align:center;background:radial-gradient(ellipse at top,#2b2415 0%,var(--notte) 70%);margin-bottom:12px}
.regole-nav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.regole-nav button{
  background:var(--notte);border:1px solid var(--bordo);border-radius:20px;color:var(--grigio);
  font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.5px;padding:6px 12px;cursor:pointer;
}
.regole-nav button.attivo{border-color:var(--mezzeria);color:var(--faro)}
.regole-corpo{font-size:14px;line-height:1.65}
.regole-corpo h3{font-family:'Oswald',sans-serif;font-size:16px;letter-spacing:1px;text-transform:uppercase;color:var(--faro);margin:14px 0 6px}
.regole-corpo h3:first-child{margin-top:0}
.regole-corpo table{width:100%;border-collapse:collapse;margin:8px 0;font-size:13px}
.regole-corpo td,.regole-corpo th{border:1px solid var(--bordo);padding:6px 8px;text-align:left}
.regole-corpo th{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--grigio)}
.regole-corpo .es{border-left:3px solid var(--bordo);padding:6px 10px;margin:8px 0;font-style:italic;color:var(--grigio);font-size:13px}
.regole-corpo ul{margin:6px 0 6px 20px}
.cartellone .grande{font-family:'Oswald',sans-serif;font-size:24px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--faro)}
.cartellone .sc{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--grigio);margin-top:3px}
.lettura{border-left:3px solid var(--mezzeria);background:rgba(245,166,35,.06);border-radius:0 8px 8px 0;padding:9px 12px;font-size:14px;font-style:italic;margin-top:8px}
#areaDati{margin-top:10px;font-family:'IBM Plex Mono',monospace;font-size:12px;display:none;width:100%}
#areaDati.aperta{display:block}
</style>
</head>
<body>
<div id="app">
<header>
  <h1>Frenemies <span class="amp">on the</span> Road</h1>
  <div id="infoScena"></div>
  <div class="hbtns">
    <button id="btnRegole" title="Regolamento">?</button>
    <button id="btnSchede" title="Schede: protagonisti, opposizione, missione, PNG">Schede</button>
    <button id="btnDiario">Diario</button>
    <button id="btnSalva">Salva</button>
  </div>
</header>
<main><div id="scena-corrente"></div></main>
</div>

<div id="iaBadge">🃏 Claude sta tramando…</div>
<div id="velo">
  <h3>Passa il tablet a</h3>
  <div class="nome" id="veloNome"></div>
  <div class="strada-velo"></div>
  <button class="azione" id="veloBtn">Sono pronto</button>
</div>

<div class="overlay" id="ovDiario">
  <div class="scatola">
    <button class="chiudi" data-chiudi="ovDiario">×</button>
    <h2 class="ts">Diario di viaggio</h2>
    <div id="diarioPitch"></div>
    <p class="sotto">Su quando si avvicinano (♥), giù quando si allontanano (♠). Si scrive da solo, leggendo il piatto.</p>
    <svg id="strada" viewBox="0 0 700 240" style="width:100%;height:auto;display:block;background:var(--notte);border-radius:10px;margin-bottom:12px"></svg>
    <div id="diarioVoci"></div>
  </div>
</div>

<div class="overlay" id="ovSchede">
  <div class="scatola">
    <button class="chiudi" data-chiudi="ovSchede">×</button>
    <h2 class="ts">Schede</h2>
    <div class="regole-nav" id="schedeNav"></div>
    <div id="schedeCorpo"></div>
  </div>
</div>

<div class="overlay" id="ovSalva">
  <div class="scatola">
    <button class="chiudi" data-chiudi="ovSalva">×</button>
    <h2 class="ts">Salvataggio</h2>
    <p class="sotto">Esporta il testo e conservalo per riprendere la partita.</p>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="secondaria" id="btnEsporta">Esporta partita</button>
      <button class="secondaria" id="btnImporta">Importa partita</button>
      <button class="secondaria" id="btnNuova">Nuova partita</button>
    </div>
    <textarea id="areaDati" rows="5" placeholder="Incolla qui una partita esportata, poi tocca Importa."></textarea>
  </div>
</div>

<div class="overlay" id="ovRegole">
  <div class="scatola">
    <button class="chiudi" data-chiudi="ovRegole">×</button>
    <h2 class="ts">Regolamento</h2>
    <div class="regole-nav" id="regoleNav"></div>
    <div id="regoleCorpo" class="regole-corpo"></div>
  </div>
</div>

<div class="overlay" id="ovModale"><div class="scatola" id="modaleCorpo"></div></div>

<script>
/* ================================================================
   FRENEMIES ON THE ROAD — motore + interfaccia
   Architettura: stato puro (G) + macchina a fasi + render per fase
================================================================ */

/* ---------------- costanti ---------------- */
const SIMBOLI = {cuori:"♥", picche:"♠", quadri:"♦", fiori:"♣"};
const FASI_NARR = ["Innesco","Adattamento","Frattura","Crisi","Risoluzione"];
const FASI_FUNZ = ["Collaborazione forzata, minaccia iniziale","Viaggio, preparativi, primi segnali di fiducia","Evento destabilizzante, dubbio sulla coppia o sulla missione","Peggioramento, verità che emergono, situazione sopraffacente","Sforzo massimo, scelta decisiva, esito finale"];
const PITCH_TEMPLATE=[
  {seme:"picche",  q:(a,b)=>`Cosa ${a} (♠) detesta di ${b} (♥)?`},
  {seme:"cuori",   q:(a,b)=>`Cosa ${b} (♥) detesta di ${a} (♠)?`},
  {seme:"picche",  q:(a,b)=>`Perché per ${a} (♠) è importante l'obiettivo?`},
  {seme:"cuori",   q:(a,b)=>`Perché per ${b} (♥) è importante l'obiettivo?`},
  {seme:"picche",  q:(a,b)=>`Quale dote o risorsa di ${a} (♠) potrebbe essere un asso nella manica?`},
  {seme:"cuori",   q:(a,b)=>`Quale dote o risorsa di ${b} (♥) potrebbe essere un asso nella manica?`},
  {seme:"quadri",  q:()=>`Quali sono i mezzi, metodi o armi più temibili della fazione nemica? (♦)`},
  {seme:"quadri",  q:()=>`Perché l'Opposizione deve assolutamente impedire ai protagonisti di ottenere quello che vogliono? (♦)`},
  {seme:"fiori",   q:()=>`Quali catastrofi o eventi imprevedibili possono manifestarsi in questa ambientazione? (♣)`},
  {seme:"fiori",   q:()=>`Che cosa i protagonisti non hanno considerato e potrebbe far saltare la loro alleanza? (♣)`}
];
const AMBIENTE = {
  picche:"In movimento, sotto pressione: ambiente caotico, situazione frenetica.",
  cuori:"Un momento di tregua o intimità: un rifugio, una pausa che permette il dialogo.",
  quadri:"Attacco del nemico: imboscata, territorio favorevole agli avversari.",
  fiori:"Evento imprevisto: luogo neutro ma instabile, caos o ambiguità immediata."
};
const LETT_DOM = {
  picche:"♠ I Protagonisti hanno determinato l'esito con forza, imposizione, conflitto diretto.",
  cuori:"♥ I Protagonisti hanno determinato l'esito con dialogo, connessione, empatia.",
  quadri:"♦ La fazione nemica ha determinato l'esito — l'opposizione organizzata ha avuto la meglio.",
  fiori:"♣ Sfortuna e caos hanno determinato l'esito — fattori esterni, imprevisti, attriti.",
  parita:"Nessun seme prevale: l'esito resta ambiguo, conteso fino all'ultimo."
};
const LETT_RAPP = {
  su:"♥ > ♠ — I protagonisti si sono avvicinati: dialogo, fiducia, un momento di connessione.",
  giu:"♠ > ♥ — I protagonisti si sono allontanati: conflitto, tensione, distanza.",
  pari:"♥ = ♠ — Il rapporto è in bilico: né avanzato né peggiorato."
};
const FIGURE = {
  F:{nome:"Fante", titolo:"L'informatore", val:8, costo:8,
     eff:"Guarda le prime 4 carte del tuo mazzo e scegli quali mettere in fondo."},

}

/* ---------------- utilità ---------------- */
function mischia(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function altro(l){return l==="P"?"O":"P"}
function lato(l){return G.lati[l]}
function nomeLato(l){return l==="P" ? (G.nomi.P||"Protagonisti") : (G.nomi.O||"Opposizione")}
function nomeCarta(c){
  if(c.jolly) return "JOLLY";
  const f=c.fig?FIGURE[c.fig].nome+" ":"";
  return f+(c.fig?"":c.val+" ")+"di "+c.seme.charAt(0).toUpperCase()+c.seme.slice(1);
}
function valore(c, dichiarato){ return c.jolly ? dichiarato : c.val }
function totaleSeme(s){ return G.piatto.filter(c=>c.seme===s).reduce((t,c)=>t+c.val,0) }
function totaleProt(){ return totaleSeme("cuori")+totaleSeme("picche") }
function totaleOpp(){ return totaleSeme("quadri")+totaleSeme("fiori") }
function puntiMercato(l){
  const L=lato(l);
  return L.bonus + L.prese.length + L.scope.filter(c=>!c.tappata && !c.esposta).length*5;
}
function ordina(mano){
  const ord={cuori:0,picche:1,quadri:2,fiori:3};
  return [...mano].sort((a,b)=> (a.jolly?9:ord[a.seme])-(b.jolly?9:ord[b.seme]) || a.val-b.val);
}

/* prese possibili: tutte le combinazioni del piatto che sommano a v */
function combosPresa(v){
  const carte=[...G.piatto].sort((a,b)=>b.val-a.val);
  const ris=[];
  function dfs(i, somma, scelte){
    if(ris.length>=30) return;
    if(somma===v){ ris.push([...scelte]); return }
    if(i>=carte.length || somma>v) return;
    if(carte[i].val+somma<=v){ scelte.push(carte[i]); dfs(i+1,somma+carte[i].val,scelte); scelte.pop(); }
    dfs(i+1,somma,scelte);
  }
  dfs(0,0,[]);
  // singole prima, poi gruppi piccoli
  ris.sort((a,b)=>a.length-b.length);
  return ris;
}

/* ---------------- controllo della mano (3/4 giocatori) ---------------- */
function latoDiviso(l){
  return (l==="P" && G.nGiocatori>=3) || (l==="O" && G.nGiocatori===4);
}
function nomeControllore(l){
  if(!latoDiviso(l)) return nomeLato(l);
  const seme=G.controllo[l];
  return G.giocatori[seme] || (SIMBOLI[seme]+" "+seme);
}
function calcolaControllo(){
  ["P","O"].forEach(l=>{
    if(!latoDiviso(l)){ G.controllo[l]=lato(l).semi[0]; return }
    const [s1,s2]=lato(l).semi;
    let ctrl;
    if(l==="P" && G.nGiocatori===3 && G.modo3==="alternanza"){
      ctrl = G.scena%2===0 ? s1 : s2;
    }else{
      const mano=lato(l).mano;
      const c1=mano.filter(c=>c.seme===s1).length, c2=mano.filter(c=>c.seme===s2).length;
      if(c1>c2) ctrl=s1; else if(c2>c1) ctrl=s2;
      else ctrl = G.prevControllo[l] ? (G.prevControllo[l]===s1?s2:s1) : s1;  // parità: chi non ha controllato la scena prima
    }
    G.prevControllo[l]=G.controllo[l];
    G.controllo[l]=ctrl;
  });
}
function aggiungiScopa(l){ G.scopeGiocatore[G.controllo[l]]++; }

/* ---------------- rete (online P2P) ---------------- */
const rete={peer:null, conn:null, mioLato:null, attiva:false, stato:"—", ricevendo:false};
function generaCodice(){
  const a="ABCDEFGHJKMNPQRSTUVWXYZ23456789"; let c="";
  for(let i=0;i<5;i++) c+=a[Math.floor(Math.random()*a.length)];
  return c;
}
function inviaStato(){
  if(rete.attiva && rete.conn && rete.conn.open && !rete.ricevendo){
    try{ rete.conn.send({t:"g", G:JSON.parse(JSON.stringify(G)), idc}); }catch(e){}
  }
}
function agganciaConn(conn){
  rete.conn=conn;
  conn.on("data",d=>{
    if(d && d.t==="g"){
      rete.ricevendo=true;
      G=d.G; if(d.idc>idc) idc=d.idc;
      if(!rete.mioLato) rete.mioLato=altro(G.hostLato);   // l'ospite prende il lato opposto
      render();
      rete.ricevendo=false;
    }
  });
  conn.on("close",()=>{ rete.stato="disconnesso"; aggiornaHeader(); });
  conn.on("error",()=>{ rete.stato="errore"; aggiornaHeader(); });
}
function creaStanza(latoScelto, cb){
  const codice=generaCodice();
  rete.peer=new Peer("fotr-"+codice);
  rete.peer.on("open",()=>{
    rete.mioLato=latoScelto; rete.attiva=true; rete.stato="in attesa";
    G.modalita="online"; G.hostLato=latoScelto;
    cb(codice);
  });
  rete.peer.on("connection",conn=>{
    agganciaConn(conn);
    conn.on("open",()=>{
      rete.stato="connesso";
      inviaStato();   // l'ospite riceve subito lo stato completo
      render();
    });
  });
  rete.peer.on("error",e=>{ rete.stato="errore: "+e.type; aggiornaHeader(); });
}
function uniscitiStanza(codice, cb){
  rete.peer=new Peer();
  rete.peer.on("open",()=>{
    const conn=rete.peer.connect("fotr-"+codice.toUpperCase().trim(),{reliable:true});
    agganciaConn(conn);
    conn.on("open",()=>{
      rete.attiva=true; rete.stato="connesso";
      cb();   // il lato dell'ospite arriva col primo stato (l'opposto dell'host)
    });
  });
  rete.peer.on("error",e=>{ rete.stato="errore: "+e.type; aggiornaHeader(); render(); });
}
/* chi può agire nella fase corrente */
function latoCheAgisce(){
  const f=G.fase;
  if(f==="setup") return ownerSetup();
  if(f==="fine_scena"||f==="jolly_intro"||f==="neutralizza"||f==="finale"||f==="primo_conteggio") return G.hostLato;
  if(f==="counter") return G.pendingJolly ? altro(G.pendingJolly.attore) : G.attore;
  if(f==="narrazione") return G.narrLato || G.attore;
  if(f==="mercato") return G.mercatoLato || G.hostLato;
  if(f==="asta_rivela") return G.rivela && G.rivela.win ? G.rivela.win : G.attore;
  return G.attore;   // asta, apertura, turno, mano_estesa
}
/* nel setup online ogni lato compila le proprie schede: Protagonisti la scena 4 e le domande
   sui protagonisti, Opposizione la scena 5 e le domande sull'opposizione; il resto all'host */
function ownerSetup(){
  if(G.modalita!=="online") return G.hostLato;
  const p=G.passo;
  if(p===4) return "P";                              // i protagonisti
  if(p===5) return "O";                              // l'opposizione
  if(p===6) return (G.passoSub||0)===0 ? "P" : "O";  // le domande: prima i protagonisti, poi l'opposizione
  return G.hostLato;                                 // intro, giocatori, tono, missione, riepilogo
}
function spettatore(){ return rete.attiva && G.modalita==="online" && latoCheAgisce()!==rete.mioLato }
function rSpettatore(){
  const f=G.fase, chi=nomeLato(latoCheAgisce());
  let extra="";
  if(f==="turno"||f==="asta"){
    extra=`
      <div class="tavolo-top">
        <div class="tot-lato p">♥+♠ Protagonisti <b>${totaleProt()}</b></div>
        <div class="tot-lato o">♦+♣ Opposizione <b>${totaleOpp()}</b></div>
      </div>
      <div id="piatto">${G.piatto.length?G.piatto.map(c=>cartaHTML(c,"mini")).join(""):'<span class="vuoto">Piatto vuoto</span>'}</div>`;
  }
  if(f==="narrazione" && G.narr){
    extra=`<div style="display:flex;justify-content:center;margin:10px 0">${G.narr.html}</div>
      <div class="pannello"><span class="etichetta">${chi} sta narrando</span><div class="lettura">${G.narr.sugg}</div></div>`;
  }
  if(f==="counter") extra=`<div class="banner">È in corso una decisione segreta…</div>`;
  if(f==="setup"){
    extra=`<div class="pannello">
      <span class="etichetta">Creazione della partita — passo ${G.passo+1}/${PASSI_WIZ.length}: ${PASSI_WIZ[G.passo]}</span>
      ${G.missione?`<div class="lettura">${G.missione}</div>`:""}
      ${G.pers.A.desc||G.pers.B.desc?`<div class="lettura">${G.pers.A.nome||"P1"} ♠: ${G.pers.A.desc}<br>${G.pers.B.nome||"P2"} ♥: ${G.pers.B.desc}</div>`:""}
    </div>`;
  }
  SC.innerHTML=`
    ${G.ultimaGiocata && (f==="turno"||f==="asta")?`<div class="banner">${G.ultimaGiocata}</div>`:""}

    <div class="cartellone" style="margin-top:14px"><div class="grande">Tocca a ${chi}</div>

const SC = document.getElementById("scena-corrente");

/* Adattamento al viewport: nessuno scroll della pagina. Dopo ogni modifica al DOM
   si parte da scala piena e si riduce --k finché il contenuto entra in <main>.
   Solo visuale: non tocca mai lo stato G. */
const MAIN_EL = document.querySelector("main");
let adattaInCorso = false;
function adattaViewport(){
  if(adattaInCorso || !MAIN_EL) return;
  adattaInCorso = true;
  const radice = document.documentElement;
  let k = 1;
  radice.style.setProperty("--k", k);
  // scrollHeight conta il padding-bottom? misuriamo con un piccolo margine di tolleranza
  let guardia = 0;
  while(MAIN_EL.scrollHeight > MAIN_EL.clientHeight + 1 && k > 0.5 && guardia < 12){
    k = Math.round((k - 0.05) * 100) / 100;
    radice.style.setProperty("--k", k);
    guardia++;
  }
  adattaInCorso = false;
}
if(MAIN_EL){
  const raf = window.requestAnimationFrame ? f=>requestAnimationFrame(f) : f=>setTimeout(f,16);
  new MutationObserver(()=>raf(adattaViewport))
    .observe(MAIN_EL, {childList:true, subtree:true});
  window.addEventListener("resize", ()=>raf(adattaViewport));
  if(document.fonts && document.fonts.ready) document.fonts.ready.then(()=>adattaViewport());
}

const FASI_CONDIVISE=new Set(["fine_scena","asta_rivela","jolly_intro","neutralizza","finale","mercato","primo_conteggio"]);
function render(){
  aggiornaHeader();
  inviaStato();
  const f = G.fase;
  if(f==="modalita"){ rModalita(); return }
  if(f==="lobby"){ rLobby(); return }
  if(spettatore() && !FASI_CONDIVISE.has(f)){ rSpettatore(); return }
  if(f==="setup") rSetup();
  else if(f==="asta") rAsta();
  else if(f==="asta_rivela") rAstaRivela();
  else if(f==="apertura") rApertura();
  else if(f==="turno") rTurno();
  else if(f==="narrazione") rNarrazione();
  else if(f==="counter") rCounter();
  else if(f==="fine_scena") rFineScena();
  else if(f==="primo_conteggio") rPrimoConteggio();
  else if(f==="colpi") rColpi();
  else if(f==="mano_estesa") rManoEstesa();
  else if(f==="mercato") rMercato();
  else if(f==="jolly_intro") rJollyIntro();
  else if(f==="neutralizza") rNeutralizza();
  else if(f==="finale") rFinale();
  if(spettatore() && FASI_CONDIVISE.has(f)){
    SC.querySelectorAll("button,input,textarea").forEach(el=>el.disabled=true);
    const nota=document.createElement("div");
    nota.className="banner";
    nota.textContent=`In attesa di ${nomeLato(latoCheAgisce())}…`;
    SC.appendChild(nota);
  }
  if(G.modalita==="solo") setTimeout(iaScheduler, 60);
}
function aggiornaHeader(){
  const el=document.getElementById("infoScena");
  const dot = (rete.attiva||G.modalita==="online")
    ? `<span style="color:${rete.stato==="connesso"?"var(--fiori)":"var(--cuori)"}">●</span> ${rete.stato}${rete.mioLato?` · sei ${nomeLato(rete.mioLato)}`:""}<br>` : "";
  if(G.fase==="setup"||G.fase==="finale"||G.fase==="modalita"||G.fase==="lobby"){ el.innerHTML=dot; return }
  const rec=G.scene[G.scena];
  const ctrl = G.nGiocatori>2
    ? `<br>${latoDiviso("P")?SIMBOLI[G.controllo.P]+" "+(nomeControllore("P")||"?"):""}${latoDiviso("O")?" · "+SIMBOLI[G.controllo.O]+" "+(nomeControllore("O")||"?"):""}`
    : "";
  el.innerHTML = dot + `Scena ${G.scena+1}/5 · ${FASI_NARR[G.scena]}` +
    (rec && rec.titolo ? `<br>«${rec.titolo}»` : "") + ctrl;
}
function intestazioneScena(){
  const rec=G.scene[G.scena];
  if(!rec) return "";
  return `<div class="scena-banner">
    <div class="st">Scena ${G.scena+1}/5 · ${FASI_NARR[G.scena]}${rec.titolo?` — «${rec.titolo}»`:""}</div>
    ${rec.posta?`<div class="sp"><b>Posta</b> · ${rec.posta}</div>`:""}
  </div>`;
}
function cartaHTML(c, cls="", dichiarato=null){
  if(c.jolly) return `<div class="carta jolly ${cls}" data-id="${c.id}"><span class="v">JOLLY</span>${dichiarato?`<span class="s" style="color:var(--faro)">${dichiarato}</span>`:""}<span class="fig">1–10</span></div>`;
  return `<div class="carta ${c.seme} ${cls} ${c.tappata?'tappata':''}" data-id="${c.id}">
    <span class="v">${c.fig||c.val}</span><span class="s">${SIMBOLI[c.seme]}</span>
    ${c.fig?`<span class="fig">${FIGURE[c.fig].titolo}</span>`:""}</div>`;
}

/* ================= WIZARD DI CREAZIONE ================= */
const PASSI_WIZ=["Il gioco","Giocatori","Tono","Missione","Protagonisti","Opposizione","Le domande","Pronti a partire"];
function caso(a){return a[Math.floor(Math.random()*a.length)]}
function salvaCampi(){
  const g=id=>{const e=document.getElementById(id);return e?e.value:null};
  const v=g("w-missione"); if(v!==null) G.missione=v;
  const pd=g("w-primadiff"); if(pd!==null) G.primaDiff=pd;
  const np=g("w-nomeP"); if(np!==null) G.nomi.P=np;
  const no=g("w-nomeO"); if(no!==null) G.nomi.O=no;
  ["picche","cuori","quadri","fiori"].forEach(sm=>{
    const v=g("w-g"+sm); if(v!==null) G.giocatori[sm]=v;
  });
  if(G.modalita==="solo"){ G.nGiocatori=2; if(!G.nomi.O) G.nomi.O="Claude"; }
  if(G.nGiocatori===2){ G.giocatori.picche=G.giocatori.cuori=G.nomi.P; G.giocatori.quadri=G.giocatori.fiori=G.nomi.O; }
  if(G.nGiocatori===3){ G.giocatori.quadri=G.giocatori.fiori=G.nomi.O; }
  const pa=g("w-persA"); if(pa!==null) G.pers.A.nome=pa;
  const da=g("w-descA"); if(da!==null) G.pers.A.desc=da;
  const pb=g("w-persB"); if(pb!==null) G.pers.B.nome=pb;
  const db=g("w-descB"); if(db!==null) G.pers.B.desc=db;
  G.pitch.forEach((p,i)=>{ const v=g("w-pitch-"+i); if(v!==null) p.risposta=v; });
  const ne=g("w-nemici"); if(ne!==null) G.nemici=ne;
  const ca=g("w-caos"); if(ca!==null) G.caos=ca;
}

    <p class="sotto">Un obiettivo concreto + una scadenza improrogabile: il successo o il fallimento saranno definitivi.</p>
    <div class="pannello">

      <textarea id="w-missione" rows="3" placeholder="…PRIMA che…">${G.missione}</textarea>
      <button class="secondaria" id="w-ispMiss" style="margin-top:10px">🎲 Ispirami</button>

  else if(p===4) corpo=`
    <h2 class="ts">I protagonisti</h2>
    <p class="sotto">Una differenza evidente, un conflitto, un motivo per collaborare nonostante tutto. Chi è a sinistra tende a ♠, chi è a destra a ♥ — ma decidete voi.</p>

        <textarea id="w-descB" rows="3">${G.pers.B.desc}</textarea></div>

  else if(p===6){
    const domandeHtml=(da,a)=>G.pitch.map((x,i)=>({x,i})).slice(da,a).map(({x,i})=>`
      <span class="etichetta" style="margin-top:10px">${SIMBOLI[x.seme]} ${PITCH_TEMPLATE[i].q(nA(),nB())}</span>

  SC.innerHTML=`

    <div style="display:flex;gap:10px;margin-top:14px">

      <button class="azione" id="w-avanti" style="flex:2">${p===PASSI_WIZ.length-1?"Mettiti in viaggio":"Avanti"}</button>
    </div>`;

  if(p===1){
    SC.querySelectorAll("button[data-ng]").forEach(b=>b.addEventListener("click",()=>{
      salvaCampi(); G.nGiocatori=parseInt(b.dataset.ng); render();
    }));
    SC.querySelectorAll("button[data-modo3]").forEach(b=>b.addEventListener("click",()=>{
      salvaCampi(); G.modo3=b.dataset.modo3; render();

    G.passoSub=0; G.passo--; render();
  });
}

/* ================= FLUSSO SCENA ================= */
function iniziaScena(){
  // pesca iniziale solo per la prima scena (le altre pescano nel mercato)
  if(G.scena===0){ pescaFinoA("P",4); pescaFinoA("O",4); }
  calcolaControllo();
  G.scene[G.scena] = G.scene[G.scena] || {titolo:"",posta:"",iniziativa:null,ambiente:"",vincitore:null,dominante:null,rapporto:null,totP:0,totO:0,riassunto:""};
  G.astaPicks={P:null,O:null};
  G.fase="asta"; G.attore="P";
  velo("P", render);
}
function pescaFinoA(l,n){
  const L=lato(l);
  while(L.mano.length<n && L.mazzo.length>0) L.mano.push(L.mazzo.shift());
}

    <div class="tavolo-top">
      <div class="tot-lato p">♥+♠ Protagonisti <b>${totaleProt()}</b></div>
      <div class="tot-lato o">♦+♣ Opposizione <b>${totaleOpp()}</b></div>
    </div>
    <div id="piatto">${G.piatto.length?G.piatto.map(c=>cartaHTML(c,"mini")).join(""):'<span class="vuoto">Piatto vuoto — la prima presa sarebbe scopa</span>'}</div>
    <div class="pannello${G.modalita==="solo"&&G.attore==="O"?" ia-nascosta":""}"><span class="etichetta">La tua mano</span><div class="mazzo-carte" id="manoAsta">
      ${ordina(L.mano).map(c=>cartaHTML(c, c.jolly?"":"")).join("")}
    </div></div>
    <button class="azione" id="confAsta" disabled>Gioca coperta</button>`;
  let scelta=null;
  SC.querySelectorAll("#manoAsta .carta").forEach(el=>{
    const c=L.mano.find(x=>x.id==el.dataset.id);
    if(c.jolly){ el.style.opacity=.35; return }
    el.addEventListener("click",()=>{
      SC.querySelectorAll(".carta").forEach(x=>x.classList.remove("sel"));
      el.classList.add("sel"); scelta=c;
      document.getElementById("confAsta").disabled=false;
    });
  });
  document.getElementById("confAsta").addEventListener("click",()=>{
    G.astaPicks[G.attore]=scelta;
    L.mano = L.mano.filter(c=>c.id!==scelta.id);
    if(G.attore==="P"){ G.attore="O"; velo("O",render); }
    else risolviAsta();
  });
}
function risolviAsta(){
  const cP=G.astaPicks.P, cO=G.astaPicks.O;
  let win=null, tieBreak=false;
  if(cP.val===cO.val){
    const prev = G.scena>0 && G.scene[G.scena-1] ? G.scene[G.scena-1].iniziativa : null;
    win = prev ? altro(prev) : "O";   // parità: a chi non ha avuto l'iniziativa la scena prima; alla prima scena, all'Opposizione
    tieBreak=true;
  }
  if(!win) win = cP.val>cO.val ? "P":"O";
  const cartaWin = win==="P"?cP:cO;
  G.astaWinner = win;
  lato(win).astaCarta = cartaWin;                       // tenuta da parte, sarà l'ultima giocata
  lato(altro(win)).mano.push(G.astaPicks[altro(win)]);  // il perdente la riprende in mano
  const rec=G.scene[G.scena];
  rec.iniziativa = win;
  rec.ambiente = AMBIENTE[cartaWin.seme];
  G.rivela={tie:false,cP,cO,win,tieBreak};
  G.astaPicks={P:null,O:null};
  G.fase="asta_rivela"; render();
}
function rAstaRivela(){
  const r=G.rivela, cP=r.cP, cO=r.cO;
  let html = `
    <h2 class="ts">Le carte si rivelano</h2>
    <div class="riga2">
      <div class="pannello" style="text-align:center"><span class="etichetta">${nomeLato("P")}</span>
        <div class="mazzo-carte">${cartaHTML(cP)}</div></div>
      <div class="pannello" style="text-align:center"><span class="etichetta">${nomeLato("O")}</span>
        <div class="mazzo-carte">${cartaHTML(cO)}</div></div>
    </div>`;
  const win=r.win, cartaWin = win==="P"?cP:cO;
  const rec=G.scene[G.scena];
  html += `
    ${r.tieBreak?`<div class="banner">Valori in parità: ${G.scena===0?"alla prima scena l'iniziativa va all'Opposizione — il mondo è contro di voi fin dall'inizio.":"l'iniziativa va a chi non l'ha avuta nella scena precedente."}</div>`:""}
    <div class="cartellone"><div class="grande">${nomeLato(win)}</div><div class="sc">${r.tieBreak?"prende l'iniziativa per alternanza, con "+nomeCarta(cartaWin):"vince l'iniziativa con "+nomeCarta(cartaWin)}</div></div>
    <div class="lettura">${SIMBOLI[cartaWin.seme]} ${rec.ambiente}</div>
    <p class="sotto" style="margin-top:10px">La carta d'asta resta da parte: sarà la sua ultima giocata del round. Il perdente riprende la propria in mano.</p>
    <button class="azione" id="vaiApertura">Continua</button>`;
  SC.innerHTML=html;
  const b=document.getElementById("vaiApertura");
  b.addEventListener("click",()=>{
    G.rivela=null;
    G.fase="apertura"; G.attore=win;
    if(G.modalita!=="online" && win!=="O") velo(win,render); else render();
  });
}

/* ================= APERTURA ================= */
function rApertura(){
  const rec=G.scene[G.scena];
  SC.innerHTML = `
    <h2 class="ts">Scena ${G.scena+1} — ${FASI_NARR[G.scena]}</h2>
    <p class="sotto">${nomeLato(G.attore)} ha l'iniziativa: dà il titolo alla scena e ne dichiara la posta.</p>
    <div class="lettura" style="margin-bottom:12px">${rec.ambiente}</div>
    ${G.scena===0&&G.primaDiff?`<div class="lettura" style="margin-bottom:12px"><b>La prima difficoltà (decisa nel pitch):</b> ${G.primaDiff}</div>`:""}
    <div class="pannello">
      <span class="etichetta">Titolo della scena</span>

/* ================= TURNO ================= */
function carteGiocabili(l){
  const L=lato(l);
  if(L.mano.length>0) return {carte:L.mano, daAsta:false};
  if(l===G.astaWinner && L.astaCarta) return {carte:[L.astaCarta], daAsta:true};
  return {carte:[], daAsta:false};
}
function roundFinito(){
  return lato("P").mano.length===0 && lato("O").mano.length===0 &&
         (!G.astaWinner || lato(G.astaWinner).astaCarta===null);
}
function prossimoTurno(){
  if(roundFinito()){ fineScena(); return }
  let next=altro(G.attore);
  if(carteGiocabili(next).carte.length===0) next=G.attore;   // l'altro ha finito: continua lo stesso
  if(carteGiocabili(next).carte.length===0){ fineScena(); return }
  const cambia = next!==G.attore && !G.saltaVelo;
  G.saltaVelo=false;
  G.attore=next; G.fase="turno";
  if(cambia) velo(next,render); else render();
}

function rTurno(){
  const l=G.attore, L=lato(l);
  const g=carteGiocabili(l);
  const peccObj = peccatoDisponibile(l);
  const sr = spinteResidue(l);
  SC.innerHTML = `
    ${intestazioneScena()}
    ${G.ultimaGiocata?`<div class="banner ${G.ultimaGiocata.includes("SCOPA")?"scopa":""}">${G.ultimaGiocata}</div>`:""}
    <div class="tavolo-top">
      <div class="tot-lato p">♥+♠ Protagonisti <b>${totaleProt()}</b></div>
      <div class="tot-lato o">♦+♣ Opposizione <b>${totaleOpp()}</b></div>
    </div>
    <div id="piatto">${G.piatto.length?G.piatto.map(c=>cartaHTML(c,"mini")).join(""):'<span class="vuoto">Piatto vuoto — una presa qui sarebbe scopa</span>'}</div>
    ${peccObj?`<button class="secondaria" id="btnPeccato" style="margin-bottom:10px">⚡ Fai emergere il peccato del Jolly avversario (+5 punti)</button>`:""}
    <div class="mano-area${G.modalita==="solo"&&l==="O"?" ia-nascosta":""}">
      <div class="mano-titolo">
        <span class="etichetta" style="margin:0">${g.daAsta?"Ultima giocata — la carta dell'asta":"Mano di "+nomeLato(l)+(latoDiviso(l)?" — gioca "+nomeControllore(l)+" "+SIMBOLI[G.controllo[l]]:"")}</span>
        <span class="contatori">prese ${L.prese.length} · scope ${L.scope.filter(c=>!c.esposta).length} · mazzo ${L.mazzo.length}</span>
      </div>
      ${sr.length?`<div class="spinte-mano">
        <span class="lbl">⚡ Spinte disponibili</span>
        ${sr.map(({p})=>`<span class="spinta-chip" style="border-left-color:var(--${p.seme})"><b style="color:var(--${p.seme})">${SIMBOLI[p.seme]}</b> <i>«${p.risposta.length>32?p.risposta.slice(0,32)+"…":p.risposta}»</i></span>`).join("")}
      </div>`:""}
      <div class="mazzo-carte" id="manoTurno">${ordina(g.carte).map(c=>cartaHTML(c)).join("")}</div>
      <div id="pannelloAzione"></div>
    </div>`;
  if(peccObj) document.getElementById("btnPeccato").addEventListener("click",()=>eseguiPeccato(l,peccObj));
  SC.querySelectorAll("#manoTurno .carta").forEach(el=>{
    el.addEventListener("click",()=>{
      SC.querySelectorAll("#manoTurno .carta").forEach(x=>x.classList.remove("sel"));
      el.classList.add("sel");
      const c=g.carte.find(x=>x.id==el.dataset.id);
      mostraOpzioni(c, g.daAsta);
    });
  });
}

function mostraOpzioni(c, daAsta){
  const box=document.getElementById("pannelloAzione");
  if(c.jolly){ opzioniJolly(c); return }
  const combos=combosPresa(c.val);
  let html=`<div class="opzioni">`;
  combos.forEach((cmb,i)=>{
    html+=`<button data-cmb="${i}">Prendi ${cmb.map(x=>(x.fig?FIGURE[x.fig].nome.charAt(0):x.val)+SIMBOLI[x.seme]).join(" + ")}${cmb.length===G.piatto.length?" — SCOPA!":""}</button>`;
  });
  html+=`<button class="neutra" data-piatto="1">Metti nel piatto</button></div>`;
  if(c.fig) html+=`<div class="banner" style="margin-top:10px">${FIGURE[c.fig].nome} — ${FIGURE[c.fig].eff}</div>`;
  box.innerHTML=html;
  box.querySelectorAll("button[data-cmb]").forEach(b=>{
    b.addEventListener("click",()=>giocaCarta(c, combos[parseInt(b.dataset.cmb)], daAsta));
  });
  box.querySelector("button[data-piatto]").addEventListener("click",()=>giocaCarta(c, null, daAsta));
}

function rimuoviDaMano(l, c, daAsta){
  const L=lato(l);
  if(daAsta) L.astaCarta=null;
  else L.mano=L.mano.filter(x=>x.id!==c.id);
}

function giocaCarta(c, combo, daAsta){
  const l=G.attore, L=lato(l);
  rimuoviDaMano(l,c,daAsta);
  let msg = `${nomeLato(l)} — ${nomeCarta(c)}: `;
  let tipo="piatto", dettagli="";
  if(combo){
    dettagli = combo.map(x=>(x.fig?FIGURE[x.fig].nome.charAt(0):x.val)+SIMBOLI[x.seme]).join(" + ");
    G.piatto = G.piatto.filter(x=>!combo.some(y=>y.id===x.id));
    L.prese.push(...combo);
    if(G.piatto.length===0){
      L.scope.push(c);  // la carta della scopa, da parte
      aggiungiScopa(l);
      tipo="scopa";
      msg+=`SCOPA! Il piatto è ripulito — un successo pieno, una svolta.`;
    }else{
      L.prese.push(c);
      tipo="presa";
      msg+=`presa di ${combo.length} cart${combo.length>1?"e":"a"} — un successo parziale, o con un costo.`;
    }
  }else{
    G.piatto.push(c);
    msg+=`giocata nel piatto — un nuovo elemento entra in scena.`;
  }
  G.ultimaGiocata=msg;
  // effetto figura dopo la narrazione, prima del cambio turno
  const dopo = c.fig ? ()=>effettoFigura(c, ()=>prossimoTurno()) : null;
  vaiNarrazione(c, tipo, dettagli, dopo);
  if(tipo==="presa" && !c.jolly){ G.narr.boostCard=c.id; render(); }
}

/* ================= NARRAZIONE ================= */
function nomeA(){return G.pers.A.nome||"il primo protagonista"}
function nomeB(){return G.pers.B.nome||"il secondo protagonista"}
function suggSeme(seme){
  switch(seme){
    case "picche": return `<b>${SIMBOLI.picche} Picche — la linea dura.</b> ${nomeA()} (o comunque i protagonisti) agisce con forza, imposizione, pressione: uno scontro, una minaccia, una decisione presa senza chiedere.`;
    case "cuori": return `<b>${SIMBOLI.cuori} Cuori — la connessione.</b> ${nomeB()} (o comunque i protagonisti) agisce con dialogo, empatia, fiducia: qualcuno si apre, qualcuno convince, qualcuno ascolta.`;
    case "quadri": return `<b>${SIMBOLI.quadri} Quadri — i nemici attivi.</b> La fazione ostile entra in azione o si fa più vicina: inseguitori, minacce organizzate, risorse avversarie messe in campo con intenzione.`;
    case "fiori": return `<b>${SIMBOLI.fiori} Fiori — il caos.</b> Sfortuna, incidenti, attriti tra i protagonisti, PNG irritanti, complicazioni che nessuno ha voluto ma che ora sono lì.`;
  }
  return "";
}
function suggerimento(c, tipo, dettagli){
  let testo="";
  if(tipo==="piatto"){
    testo=`<b>Introduci.</b> Stai aggiungendo un elemento con cui l'avversario dovrà fare i conti — non risolve ciò che è già in scena, lo complica.`;
  }else if(tipo==="presa"){
    testo=`<b>Superamento parziale.</b> Narra un successo con un costo, o un ostacolo gestito senza risolvere tutto: gli elementi presi (${dettagli}) escono di scena, ma lasciano un segno.`;
  }else if(tipo==="scopa"){
    testo=`<b>SVOLTA.</b> Successo pieno, ribaltamento: la scena si ripulisce in un colpo solo. Concediti il momento — è una delle giocate che la storia ricorderà.`;
  }
  let extra="";
  if(c && c.fig){
    const f=FIGURE[c.fig];
    extra=`<br><br><b>${f.nome} — ${f.titolo}.</b> Entra in scena un PNG significativo: ${
      c.fig==="F" ? "un contatto, una fonte, qualcuno che sa cose che gli altri non sanno."
      : c.fig==="D" ? "qualcuno che seduce, distrae, manipola: crea disordine nelle file dell'altro lato."
      : "un alleato potente, un intervento quasi da deus ex machina, qualcuno che nessuno si aspettava."
    }`;
  }
  if(c && c.jolly){
    extra=`<br><br><b>JOLLY.</b> Il vantaggio è ottenuto nel modo sbagliato: narra il mezzo moralmente discutibile — una bugia, una minaccia, una scorciatoia che qualcuno pagherà.`;
  }
  const seme = c && !c.jolly ? `<br><br>${suggSeme(c.seme)}` : "";
  return testo + seme + extra;
}
function semiLato(l){ return lato(l).semi }
function spinteResidue(l){
  // spinte del pitch ancora spendibili dal lato nel corso della partita
  // (risposta scritta, seme del lato, non ancora usata, seme non già bruciato; vietate nell'ultima scena)
  if(G.scena>=4) return [];
  return G.pitch.map((p,i)=>({p,i}))
    .filter(({p})=>p.risposta && semiLato(l).includes(p.seme) && !p.usata && !G.spinte[l][p.seme]);
}
function spinteDisponibili(l){
  if(G.scena>=4 || !G.narr || !G.narr.boostCard) return [];
  const c=lato(l).prese.find(x=>x.id===G.narr.boostCard);
  if(!c) return [];
  return G.pitch.map((p,i)=>({p,i}))
    .filter(({p})=>p.seme===c.seme && semiLato(l).includes(p.seme) && p.risposta && !p.usata && !G.spinte[l][p.seme]);
}
function eseguiSpinta(idxPitch){
  const l=G.narrLato||G.attore, L=lato(l), p=G.pitch[idxPitch];
  const c=L.prese.find(x=>x.id===G.narr.boostCard);
  if(!c) return;
  p.usata=true; G.spinte[l][p.seme]=true;
  L.prese=L.prese.filter(x=>x.id!==c.id);
  L.scope.push(c);
  aggiungiScopa(l);
  const residue=G.piatto.length;
  if(residue){ L.prese.push(...G.piatto); G.piatto=[]; }
  G.narr.boostCard=null;
  G.narr.tipo="scopa";
  G.narr.sugg=`<b>RISORSA DEL PITCH — la presa diventa SCOPA${residue?" e svuota il piatto":""}.</b> Porta in narrazione, come scena, rivelazione o flashback: <i>«${p.risposta}»</i>. Il momento cambia peso: da successo parziale a svolta.`;
  G.ultimaGiocata+=` ⚡ Risorsa del pitch attivata: la presa diventa SCOPA${residue?` e raccoglie le ${residue} carte rimaste nel piatto`:""}.`;
  render();
}
let narrDopo=null;
function vaiNarrazione(c, tipo, dettagli, dopoNarrazione, suggOverride, narrLato){
  G.narr={html:c?cartaHTML(c):"", tipo, sugg:suggOverride||suggerimento(c,tipo,dettagli), seme:(c && !c.jolly && c.seme)?c.seme:null, fig:(c && c.fig)?c.fig:null};
  G.narrLato = narrLato || G.attore;
  narrDopo=dopoNarrazione;
  G.fase="narrazione"; render();
}
function rNarrazione(){
  const n=G.narr;
  SC.innerHTML=`
    ${intestazioneScena()}
    ${G.ultimaGiocata?`<div class="banner ${n.tipo==="scopa"?"scopa":""}">${G.ultimaGiocata}</div>`:""}
    <div style="display:flex;justify-content:center;margin:10px 0">${n.html}</div>
    <div class="pannello">
      <span class="etichetta">Ora narra${latoDiviso(G.narrLato||G.attore)?" — "+nomeControllore(G.narrLato||G.attore):""}</span>
      <div class="lettura">${n.sugg}</div>
    </div>
    ${n.boostCard && spinteDisponibili(G.narrLato||G.attore).length ? `
    <div class="pannello">
      <span class="etichetta">⚡ Risorse del pitch — spunta la risposta del seme della presa: SCOPA vera, il piatto si svuota</span>
      <div class="opzioni">${spinteDisponibili(G.narrLato||G.attore).map(({p,i})=>
        `<button data-spinta="${i}">${SIMBOLI[p.seme]} «${p.risposta.length>60?p.risposta.slice(0,60)+"…":p.risposta}»</button>`).join("")}</div>
    </div>`:""}
    ${(G.pngNarr||[]).length?`<div class="spinte-mano"><span class="lbl">PNG creati</span>${(G.pngNarr||[]).map(p=>`<span class="spinta-chip" style="border-left-color:var(--${p.seme})"><b style="color:var(--${p.seme})">${SIMBOLI[p.seme]}</b> ${p.nome||"(senza nome)"}</span>`).join("")}</div>`:""}
    <div style="display:flex;gap:10px">
      <button class="azione" style="flex:1" id="narrOk">Narrato — avanti</button>
      ${n.seme && !n.fig?`<button class="secondaria" id="creaPng" title="Crea un PNG legato al seme della carta giocata">➕ Crea PNG ${SIMBOLI[n.seme]}</button>`:""}
    </div>`;
  SC.querySelectorAll("button[data-spinta]").forEach(b=>
    b.addEventListener("click",()=>eseguiSpinta(parseInt(b.dataset.spinta))));
  const cpBtn=document.getElementById("creaPng"); if(cpBtn) cpBtn.addEventListener("click",creaPng);
  document.getElementById("narrOk").addEventListener("click",()=>{
    const f=narrDopo; narrDopo=null; G.narr=null; G.narrLato=null;
    if(f) f(); else prossimoTurno();
  });
}
function creaPng(){
  const seme=G.narr && G.narr.seme;
  if(!seme) return;
  modale(`<h2 class="ts">Nuovo PNG ${SIMBOLI[seme]}</h2>
    <p class="sotto">Un personaggio non giocante legato al seme della carta appena giocata (${SIMBOLI[seme]}). Entra nel registro dei PNG.</p>
    <div class="pannello">
      <span class="etichetta">Nome del PNG</span>
      <input type="text" id="m-pngn-nome" placeholder="Come si chiama?">
      <span class="etichetta" style="margin-top:10px">Descrizione</span>
      <textarea id="m-pngn-desc" rows="3" placeholder="Chi è, che aspetto ha, cosa vuole"></textarea>
    </div>
    <div style="display:flex;gap:10px">
      <button class="azione" style="flex:1" id="pngnOk">Crea il PNG</button>
      <button class="secondaria" id="pngnNo">Annulla</button>
    </div>`);
  document.getElementById("pngnOk").addEventListener("click",()=>{
    const nome=document.getElementById("m-pngn-nome").value.trim();
    const desc=document.getElementById("m-pngn-desc").value.trim();
    chiudiModale();
    if(!nome && !desc) return;   // niente da registrare
    G.pngNarr=G.pngNarr||[];
    G.pngNarr.push({seme, nome, desc, scena:G.scena});
    render();
  });
  document.getElementById("pngnNo").addEventListener("click",chiudiModale);
}

/* ================= FIGURE ================= */
function modale(html){ document.getElementById("modaleCorpo").innerHTML=html; document.getElementById("ovModale").classList.add("attivo") }
function chiudiModale(){ document.getElementById("ovModale").classList.remove("attivo") }

function effettoFigura(c, poi){
  const l=G.attore, L=lato(l), A=lato(altro(l));
  if(c.fig==="F"){
    const top=L.mazzo.slice(0,4);
    if(top.length===0){ poi(); return }
    modale(`<h2 class="ts">Fante — L'informatore</h2>
      <p class="sotto">Le prime ${top.length} carte del tuo mazzo. Tocca quelle da mandare in fondo.</p>
      <div class="mazzo-carte" id="fanteCarte">${top.map(x=>cartaHTML(x)).join("")}</div>
      <button class="azione" id="fanteOk" style="margin-top:14px">Conferma</button>`);
    const inFondo=new Set();
    document.querySelectorAll("#fanteCarte .carta").forEach(el=>{
      el.addEventListener("click",()=>{
        const id=parseInt(el.dataset.id);
        if(inFondo.has(id)){inFondo.delete(id);el.classList.remove("sel")}
        else{inFondo.add(id);el.classList.add("sel")}
      });
    });
    document.getElementById("fanteOk").addEventListener("click",()=>{
      const resto=L.mazzo.slice(top.length);
      const su=top.filter(x=>!inFondo.has(x.id));
      const giu=top.filter(x=>inFondo.has(x.id));
      L.mazzo=[...su,...resto,...giu];
      chiudiModale(); poi();
    });
  }
  else if(c.fig==="D"){
    if(A.mano.length>0){
      const i=Math.floor(Math.random()*A.mano.length);
      const scartata=A.mano.splice(i,1)[0];
      A.scarti.push(scartata);
      if(A.mazzo.length>0) A.mano.push(A.mazzo.shift());
      G.ultimaGiocata += ` La Dama agisce: l'avversario scarta ${nomeCarta(scartata)} e pesca dal mazzo.`;
    }
    poi();
  }
  else if(c.fig==="R"){
    const scartiUtili=L.scarti.filter(x=>L.semi.includes(x.seme));
    if(L.mano.length===0 || scartiUtili.length===0){ poi(); return }
    let manoSel=null, scartoSel=null;
    modale(`<h2 class="ts">Re — Il deus ex machina</h2>
      <p class="sotto">Scambia una carta della tua mano con una dei tuoi scarti dello stesso seme.</p>
      <span class="etichetta">La tua mano</span>
      <div class="mazzo-carte" id="reMano">${ordina(L.mano).map(x=>cartaHTML(x)).join("")}</div>
      <span class="etichetta" style="margin-top:12px">I tuoi scarti</span>
      <div class="mazzo-carte" id="reScarti">${scartiUtili.map(x=>cartaHTML(x)).join("")}</div>
      <div style="display:flex;gap:8px;margin-top:14px">
        <button class="azione" id="reOk" disabled>Scambia</button>
        <button class="secondaria" id="reNo">Rinuncia</button>
      </div>`);
    function agg(){
      document.getElementById("reOk").disabled = !(manoSel && scartoSel && manoSel.seme===scartoSel.seme);
    }
    document.querySelectorAll("#reMano .carta").forEach(el=>el.addEventListener("click",()=>{
      document.querySelectorAll("#reMano .carta").forEach(x=>x.classList.remove("sel"));
      el.classList.add("sel"); manoSel=L.mano.find(x=>x.id==el.dataset.id); agg();
    }));
    document.querySelectorAll("#reScarti .carta").forEach(el=>el.addEventListener("click",()=>{
      document.querySelectorAll("#reScarti .carta").forEach(x=>x.classList.remove("sel"));
      el.classList.add("sel"); scartoSel=L.scarti.find(x=>x.id==el.dataset.id); agg();
    }));
    document.getElementById("reOk").addEventListener("click",()=>{
      L.mano=L.mano.filter(x=>x.id!==manoSel.id); L.scarti.push(manoSel);
      L.scarti=L.scarti.filter(x=>x.id!==scartoSel.id); L.mano.push(scartoSel);
      G.ultimaGiocata += ` Il Re interviene: ${nomeCarta(scartoSel)} torna dagli scarti.`;
      chiudiModale(); poi();
    });
    document.getElementById("reNo").addEventListener("click",()=>{chiudiModale(); poi();});
  }
  else poi();
}

/* ================= JOLLY ================= */
function opzioniJolly(c){
  const box=document.getElementById("pannelloAzione");
  if(G.piatto.length===0){
    box.innerHTML=`<div class="banner">Piatto vuoto: il piano scorretto non ha appigli. Il Jolly finisce tra le tue scope come risorsa fallita, esposta all'avversario.</div>
      <div class="opzioni"><button id="jFallisce">Gioca comunque il Jolly</button></div>`;
    document.getElementById("jFallisce").addEventListener("click",()=>{
      const l=G.attore;
      rimuoviDaMano(l,c,false);
      c.esposta=true; lato(l).scope.push(c);
      G.ultimaGiocata=`${nomeLato(l)} gioca il Jolly su piatto vuoto: il piano scorretto fallisce senza alcun vantaggio.`;
      vaiNarrazione(c,"piatto","",null,
        `<b>Il piano fallisce.</b> Narra il tentativo scorretto che non trova appigli: la bugia che nessuno beve, la trappola scattata a vuoto. Il Jolly resta tra le tue scope come risorsa fallita, esposta agli occhi dell'avversario.`);
    });
    return;
  }
  let html=`<div class="banner">Dichiara il valore del Jolly (1–10). Ricorda: dovrai narrare <b>come ottieni il vantaggio con un mezzo moralmente discutibile</b>.</div><div class="opzioni">`;
  for(let v=1;v<=10;v++){
    const ha=combosPresa(v).length>0;
    html+=`<button data-v="${v}" ${ha?"":"disabled style='opacity:.3'"}>${v}</button>`;
  }
  html+=`</div><div id="jollyCombos"></div>`;
  box.innerHTML=html;
  box.querySelectorAll("button[data-v]").forEach(b=>b.addEventListener("click",()=>{
    const v=parseInt(b.dataset.v);
    const combos=combosPresa(v);
    const jc=document.getElementById("jollyCombos");
    jc.innerHTML=`<div class="opzioni" style="margin-top:8px">`+combos.map((cmb,i)=>
      `<button data-c="${i}">Come ${v}: prendi ${cmb.map(x=>(x.fig?FIGURE[x.fig].nome.charAt(0):x.val)+SIMBOLI[x.seme]).join(" + ")}${cmb.length===G.piatto.length?" — SCOPA!":""}</button>`).join("")+`</div>`;
    jc.querySelectorAll("button[data-c]").forEach(bb=>bb.addEventListener("click",()=>{
      G.pendingJolly={attore:G.attore, carta:c, valore:v, combo:combos[parseInt(bb.dataset.c)]};
      G.fase="counter";
      velo(altro(G.attore),render);   // decisione segreta dell'avversario, sempre
    }));
  }));
}

function rCounter(){
  const pj=G.pendingJolly, dif=altro(pj.attore), D=lato(dif);
  if(G.modalita==="solo" && dif==="O"){
    SC.innerHTML=`${intestazioneScena()}<h2 class="ts">Mossa scorretta in corso</h2>
      <div class="banner">Giochi il <b>JOLLY come ${pj.valore}</b>. L'Opposizione valuta la mossa…</div>`;
    return;
  }
  const haJolly=D.mano.some(x=>x.jolly);
  SC.innerHTML=`
    ${intestazioneScena()}
    <h2 class="ts">Mossa scorretta in corso</h2>
    <div class="banner">${nomeLato(pj.attore)} gioca il <b>JOLLY come ${pj.valore}</b> e vuole prendere:
      <div class="mazzo-carte" style="margin-top:8px">${pj.combo.map(x=>cartaHTML(x,"mini")).join("")}</div>
      ${pj.combo.length===G.piatto.length?"<b>Sarebbe SCOPA.</b>":""}
    </div>
    ${haJolly
      ? `<p class="sotto">Hai un Jolly in mano: puoi smascherare il tentativo. Se lo fai, prendi <b>tutte le carte del piatto</b> e i due Jolly escono dal gioco.</p>
         <div style="display:flex;gap:10px;flex-wrap:wrap">
           <button class="azione" style="flex:1" id="cSi">COUNTER — Smaschera</button>
           <button class="secondaria" style="flex:1" id="cNo">Lascia correre</button>
         </div>`
      : `<p class="sotto">Non hai modo di opporti a questa mossa.</p>
         <button class="azione" id="cNo">Continua</button>`}`;
  document.getElementById("cNo").addEventListener("click",()=>risolviJolly(false));
  if(haJolly) document.getElementById("cSi").addEventListener("click",()=>risolviJolly(true));
}
function risolviJolly(counter){
  const pj=G.pendingJolly, l=pj.attore, L=lato(l), dif=altro(l), D=lato(dif);
  rimuoviDaMano(l,pj.carta,false);
  G.pendingJolly=null;
  G.saltaVelo=true;   // il difensore ha già il tablet in mano
  if(counter){
    const jollyDif=D.mano.find(x=>x.jolly);
    D.mano=D.mano.filter(x=>x.id!==jollyDif.id);
    D.prese.push(...G.piatto);
    G.piatto=[];
    G.ultimaGiocata=`COUNTER! ${nomeLato(dif)} smaschera il tentativo: prende tutto il piatto, entrambi i Jolly escono dal gioco.`;
    vaiNarrazione(null,"presa","",null,
      `<b>COUNTER.</b> ${nomeLato(dif)} narra come il tentativo scorretto viene smascherato: la trappola smontata davanti a tutti, il piano esposto — e tutto ciò che era in scena finisce nelle sue mani.`, dif);
    return;
  }
  G.piatto=G.piatto.filter(x=>!pj.combo.some(y=>y.id===x.id));
  L.prese.push(...pj.combo);
  if(G.piatto.length===0){
    pj.carta.peccato=true; L.scope.push(pj.carta); L.peccatoScena=G.scena;
    aggiungiScopa(l);
    G.ultimaGiocata=`${nomeLato(l)} — SCOPA col Jolly come ${pj.valore}. Resta un peccato latente.`;
    vaiNarrazione(pj.carta,"scopa","",null,
      `<b>SVOLTA scorretta.</b> ${nomeLato(l)} narra il mezzo moralmente discutibile con cui ripulisce la scena in un colpo solo — una bugia, una minaccia, una scorciatoia. Il vantaggio è pieno, ma il <b>peccato resta latente</b>: in una scena futura potrebbe tornare a chiedere il conto.`);
  }else{
    L.prese.push(pj.carta);
    G.ultimaGiocata=`${nomeLato(l)} — presa col Jolly come ${pj.valore}.`;
    vaiNarrazione(pj.carta,"presa","",null,
      `<b>Vantaggio scorretto.</b> ${nomeLato(l)} narra come ottiene questo successo parziale con un mezzo moralmente discutibile — tecnicamente sbagliato, sicuramente efficace.`);
  }
}

/* peccato latente: l'avversario può farlo emergere in una scena successiva */
function peccatoDisponibile(l){
  const S=lato(altro(l));
  if(S.peccatoScena>=0 && S.peccatoScena<G.scena){
    const j=S.scope.find(x=>x.jolly && x.peccato);
    if(j) return j;
  }
  return null;
}
function eseguiPeccato(l, jollyCard){
  const S=lato(altro(l));
  S.scope=S.scope.filter(x=>x.id!==jollyCard.id);
  S.peccatoScena=-1;
  lato(l).bonus+=5;
  G.ultimaGiocata=`Il peccato emerge: il Jolly di ${nomeLato(altro(l))} viene eliminato e ${nomeLato(l)} ottiene 5 punti. Narra come il passato torna a chiedere il conto.`;
  render();
}

/* ================= FINE SCENA ================= */
function fineScena(){
  if(G.scena===4){
    const tP=totaleProt(), tO=totaleOpp();
    G.colpi={passaggi:0, attore: tP<tO?"P":tP>tO?"O":"P", apparente:{tP,tO}};
    G.ultimaGiocata="";
    G.fase="primo_conteggio"; render(); return;
  }
  chiudiScena();
  G.ultimaGiocata="";
  G.fase="fine_scena"; render();
}
function chiudiScena(){
  const rec=G.scene[G.scena];
  rec.totP=totaleProt(); rec.totO=totaleOpp();
  rec.vincitore = rec.totP>rec.totO ? "P" : rec.totO>rec.totP ? "O" : "parita";
  // seme dominante = somma più alta nel piatto
  const somme=Object.keys(SIMBOLI).map(s=>({s,t:totaleSeme(s)})).sort((a,b)=>b.t-a.t);
  rec.dominante = (somme[0].t===0 || somme[0].t===somme[1].t) ? "parita" : somme[0].s;
  const tc=totaleSeme("cuori"), tp=totaleSeme("picche");
  rec.rapporto = tc>tp?"su":tp>tc?"giu":"pari";
  // recupero dei protagonisti
  rec.recupero=null;
  if(rec.vincitore==="P" && lato("P").scarti.length>0){
    const i=Math.floor(Math.random()*lato("P").scarti.length);
    const c=lato("P").scarti.splice(i,1)[0];
    lato("P").mazzo.push(c);
    rec.recupero=nomeCarta(c);
  }
}
function rFineScena(){
  const rec=G.scene[G.scena];
  const vincNome = rec.vincitore==="parita" ? "PARITÀ" : nomeLato(rec.vincitore);
  SC.innerHTML=`
    <h2 class="ts">Fine della scena ${G.scena+1}</h2>
    ${rec.titolo?`<p class="sotto">«${rec.titolo}»${rec.posta?" — "+rec.posta:""}</p>`:""}
    <div class="cartellone"><div class="grande">${vincNome}</div>
      <div class="sc">piatto: ♥+♠ ${rec.totP} contro ♦+♣ ${rec.totO}</div></div>
    ${rec.vincitore==="P"?`<div class="banner">La posta è raggiunta.${rec.recupero?` I Protagonisti recuperano ${rec.recupero} dagli scarti, in fondo al mazzo.`:""}</div>`:""}
    ${rec.vincitore==="O"?`<div class="banner">La posta fallisce: la situazione peggiora per i protagonisti. Nessun recupero.</div>`:""}
    ${rec.vincitore==="parita"?`<div class="banner">Totali in equilibrio: la posta resta sospesa, nessun recupero.</div>`:""}
    <div class="pannello">
      <span class="etichetta">Lettura del piatto</span>
      <div class="lettura">${LETT_DOM[rec.dominante]}</div>
      <div class="lettura">${LETT_RAPP[rec.rapporto]}</div>
    </div>
    <div class="pannello">
      <span class="etichetta">Com'è finita la scena — riassunto per il diario</span>
      <textarea id="fs-riassunto" rows="3" placeholder="Due righe su come si è chiusa la scena…">${rec.riassunto||""}</textarea>
    </div>
    <div class="banner">Le carte restano nel piatto: chi aprirà la prossima scena potrà già fare presa o scopa.</div>
    <button class="azione" id="fs-avanti">${G.scena===4?"Vai al finale":"Vai al mercato"}</button>`;
  document.getElementById("fs-avanti").addEventListener("click",()=>{
    rec.riassunto=document.getElementById("fs-riassunto").value;
    if(G.scena===4){ G.fase="finale"; render(); return }
    avviaMercato();
  });
}

/* ================= MERCATO ================= */
function avviaMercato(){
  // ordine: 1) Jolly nei mazzi (fine 3ª scena, PRIMA della pesca)  2) pesca nuova mano  3) acquisti
  if(G.scena===2 && !G.jollyEntrato) entraJollyNeiMazzi();
  const preScena5 = (G.scena===3);
  G.mercatoLato = G.modalita==="online" ? "P" : null;
  if(preScena5){
    G.estesa={P:false,O:false};
    G.fase="mano_estesa"; G.attore="P"; velo("P",render);
  }else{
    pescaFinoA("P",4); pescaFinoA("O",4);
    G.fase="mercato"; render();
  }
}
function rManoEstesa(){
  const l=G.attore, L=lato(l);
  if(L.mazzo.length>=5 && L.mazzo.length<=7){
    const tutte=[...L.mazzo];
    SC.innerHTML=`
      <h2 class="ts">Mano finale — ${nomeLato(l)}</h2>
      <p class="sotto">Nel mazzo restano ${tutte.length} carte: le prendi tutte. Scegline 4 per l'ultima scena; le altre vanno in riserva, fuori dal gioco.</p>
      <div class="pannello${G.modalita==="solo"&&l==="O"?" ia-nascosta":""}"><div class="mazzo-carte" id="estCarte">${ordina(tutte).map(c=>cartaHTML(c)).join("")}</div></div>
      <button class="azione" id="estOk" disabled>Conferma (0/4)</button>`;
    const scelte=new Set();
    const btn=document.getElementById("estOk");
    SC.querySelectorAll("#estCarte .carta").forEach(el=>el.addEventListener("click",()=>{
      const id=parseInt(el.dataset.id);
      if(scelte.has(id)){scelte.delete(id);el.classList.remove("sel")}
      else if(scelte.size<4){scelte.add(id);el.classList.add("sel")}
      btn.disabled=scelte.size!==4;
      btn.textContent=`Conferma (${scelte.size}/4)`;
    }));
    btn.addEventListener("click",()=>{
      L.mano.push(...tutte.filter(c=>scelte.has(c.id)));
      L.riserva.push(...tutte.filter(c=>!scelte.has(c.id)));
      L.mazzo=[];
      fineEstesa(l);
    });
  }else{
    pescaFinoA(l,4);   // ≤4: le prende tutte; >7: pesca 4 normalmente
    SC.innerHTML=`
      <h2 class="ts">Mano finale — ${nomeLato(l)}</h2>
      <p class="sotto">${L.mazzo.length===0?"Hai preso in mano tutte le carte rimaste.":"Hai pescato la mano per l'ultima scena."}</p>
      <div class="pannello${G.modalita==="solo"&&l==="O"?" ia-nascosta":""}"><div class="mazzo-carte">${ordina(L.mano).map(c=>cartaHTML(c)).join("")}</div></div>
      <button class="azione" id="estOk">Continua</button>`;
    document.getElementById("estOk").addEventListener("click",()=>fineEstesa(l));
  }
}
function fineEstesa(l){
  G.estesa[l]=true;
  if(!G.estesa.O){ G.attore="O"; velo("O",render); }
  else { G.fase="mercato"; render(); }
}

function rMercato(){
  const online = G.modalita==="online";
  function pannelloLato(l){
    const L=lato(l);
    const punti=puntiMercato(l);
    const pecc=peccatoDisponibile(l);
    return `<div class="pannello">
      <span class="etichetta">${nomeLato(l)} ${L.semi.map(s=>SIMBOLI[s]).join("")}</span>
      <div class="punti-big" id="punti-${l}">${punti}</div>
      <div class="contatori">carte prese ${L.prese.length} · scope attive ${L.scope.filter(c=>!c.tappata&&!c.esposta).length}${L.bonus?` · bonus ${L.bonus}`:""}</div>
      ${pecc?`<button class="secondaria" style="margin-top:8px;width:100%" data-pecc="${l}">⚡ Fai emergere il peccato avversario (+5)</button>`:""}
      <div style="margin-top:10px">
        ${Object.entries(FIGURE).map(([k,f])=>`
          <div class="fig-riga">
            <div class="desc"><b>${f.nome} — ${f.costo} punti</b><small>${f.eff}</small></div>
            <div class="compra">${L.semi.map(s=>(G.figureComprate||[]).includes(k+s)?`<span class="fig-esaurita" title="già acquistata">${SIMBOLI[s]}✓</span>`:`<button data-l="${l}" data-f="${k}" data-s="${s}" ${punti<f.costo?"disabled":""}>${SIMBOLI[s]}</button>`).join("")}</div>
          </div>`).join("")}
      </div>
      <div class="banner" id="esito-${l}" style="display:none;margin-top:10px"></div>
    </div>`;
  }
  const pannelli = online ? pannelloLato(G.mercatoLato) : pannelloLato("P")+pannelloLato("O");
  const etichettaFine = online
    ? (G.mercatoLato==="P" ? "Ho finito — tocca all'Opposizione" : "Chiudi il mercato e riparti")
    : "Chiudi il mercato e riparti";
  SC.innerHTML=`
    <h2 class="ts">Il mercato${online?" — "+nomeLato(G.mercatoLato):""}</h2>
    <p class="sotto">La nuova mano è già stata pescata. Pagamento automatico: prima i punti bonus, poi le carte prese (vanno negli scarti), infine le scope (vengono tappate). Le figure entrano nel mazzo, subito rimescolato.</p>
    <div class="mercato-griglia">${pannelli}</div>
    <button class="azione" id="m-fine">${etichettaFine}</button>`;
  SC.querySelectorAll("button[data-f]").forEach(b=>b.addEventListener("click",()=>{
    const l=b.dataset.l, f=b.dataset.f, s=b.dataset.s;
    if((G.figureComprate||[]).includes(f+s)) return;   // ogni figura esiste in una sola copia (v1.2)
    if(puntiMercato(l)<FIGURE[f].costo) return;
    chiediPng(l,f,s,b);
  }));
  SC.querySelectorAll("button[data-pecc]").forEach(b=>b.addEventListener("click",()=>{
    const l=b.dataset.pecc, j=peccatoDisponibile(l);
    if(j){ eseguiPeccato(l,j); G.fase="mercato"; render(); }
  }));
  document.getElementById("m-fine").addEventListener("click",()=>{
    if(online && G.mercatoLato==="P"){ G.mercatoLato="O"; render(); return }
    G.mercatoLato=null;
    if(G.scena===2 && !G.jollyIntroVisto){ G.jollyIntroVisto=true; G.fase="jolly_intro"; render(); }
    else avanzaScena();
  });
}
function acquistaFigura(l,f,s,nome,desc,b){
  const L=lato(l);
  if((G.figureComprate||[]).includes(f+s)) return;   // copia unica (v1.2)
  if(!pagaCosto(l, FIGURE[f].costo)) return;
  G.figureComprate=G.figureComprate||[];
  G.figureComprate.push(f+s);
  G.png=G.png||{};
  G.png[f+s]={nome:(nome||"").trim(), desc:(desc||"").trim()};
  L.mazzo.push(carta(s, FIGURE[f].val, f));
  L.mazzo=mischia(L.mazzo);
  if(b && document.contains(b)) b.outerHTML=`<span class="fig-esaurita" title="già acquistata">${SIMBOLI[s]}✓</span>`;
  const es=document.getElementById("esito-"+l);
  if(es){ es.style.display="block";
    es.innerHTML=(es.innerHTML?es.innerHTML+"<br>":"")+`Acquistato ${FIGURE[f].nome} ${SIMBOLI[s]}${(nome||"").trim()?` — “${nome.trim()}”`:""} — entra nel mazzo, rimescolato.`; }
  const pel=document.getElementById("punti-"+l); if(pel) pel.textContent=puntiMercato(l);
  SC.querySelectorAll(`button[data-l="${l}"]`).forEach(x=>{ x.disabled = puntiMercato(l)<FIGURE[x.dataset.f].costo; });
  inviaStato();
}
function chiediPng(l,f,s,b){
  const fig=FIGURE[f];
  modale(`<h2 class="ts">${fig.nome} di ${s} ${SIMBOLI[s]}</h2>
    <p class="sotto">${fig.titolo} — ${fig.eff}<br>Dai un nome e una storia a questo PNG: finirà nel registro dei PNG.</p>
    <div class="pannello">
      <span class="etichetta">Nome del PNG</span>
      <input type="text" id="m-png-nome" placeholder="Come si chiama?">
      <span class="etichetta" style="margin-top:10px">Descrizione</span>
      <textarea id="m-png-desc" rows="3" placeholder="Chi è, che aspetto ha, cosa vuole"></textarea>
    </div>
    <div style="display:flex;gap:10px">
      <button class="azione" style="flex:1" id="pngOk">Conferma acquisto</button>
      <button class="secondaria" id="pngNo">Annulla</button>
    </div>`);
  document.getElementById("pngOk").addEventListener("click",()=>{
    const nome=document.getElementById("m-png-nome").value;
    const desc=document.getElementById("m-png-desc").value;
    chiudiModale();
    acquistaFigura(l,f,s,nome,desc,b);
  });
  document.getElementById("pngNo").addEventListener("click",chiudiModale);
}
function pagaCosto(l, costo){
  const L=lato(l);
  if(puntiMercato(l)<costo) return false;
  let resto=costo;
  const usaBonus=Math.min(L.bonus,resto); L.bonus-=usaBonus; resto-=usaBonus;
  while(resto>0 && L.prese.length>0){
    const i=Math.floor(Math.random()*L.prese.length);
    L.scarti.push(L.prese.splice(i,1)[0]); resto-=1;
  }
  while(resto>0){
    const sc=L.scope.find(c=>!c.tappata && !c.esposta);
    if(!sc) break;
    sc.tappata=true; resto-=5;
  }
  return true;
}
function entraJollyNeiMazzi(){
  G.jollyEntrato=true;
  ["P","O"].forEach(l=>{
    const L=lato(l), j=carta(null,0,null,true);
    j.seme="jolly";
    L.mazzo.splice(Math.floor(Math.random()*(L.mazzo.length+1)),0,j);
  });
}

function avanzaScena(){
  G.scena++;
  if(G.scena===4){
    // neutralizzazione delle figure rimaste nel piatto, prima dell'ultima scena
    const figure=G.piatto.filter(c=>c.fig);
    if(figure.length===0){ iniziaScena(); return }
    G.neutralizzati=[];
    figure.forEach(c=>{
      const prop = lato("P").semi.includes(c.seme) ? "P":"O";
      const avv=altro(prop);
      G.piatto=G.piatto.filter(x=>x.id!==c.id);
      lato(avv).scope.push(c); // conta come una scopa per l'avversario
      aggiungiScopa(avv);
      G.neutralizzati.push({fig:c.fig, seme:c.seme, prop, avv});
    });
    G.fase="neutralizza"; render();
  }
  else iniziaScena();
}

/* ================= COLPI DI SCENA FINALI ================= */
function colpiPossibili(l){
  const L=lato(l), semiAvv=lato(altro(l)).semi;
  return L.riserva.some(r=>G.piatto.some(c=>semiAvv.includes(c.seme) && c.val>=r.val));
}
function rPrimoConteggio(){
  const a=G.colpi.apparente;
  const vinc = a.tP>a.tO?"P":a.tO>a.tP?"O":"parita";
  SC.innerHTML=`

      <div class="sc">♥+♠ ${a.tP} contro ♦+♣ ${a.tO} — ma le cose potrebbero non essere come appaiono</div></div>
    <div class="pannello">
      <span class="etichetta">Ora narra</span>
      <div class="lettura">Raccontate insieme <b>come sembra finire</b>: chi sta vincendo, cosa sta per succedere. Poi le riserve potranno ribaltare il quadro.</div>

function rColpi(){
  const l=G.attore, L=lato(l), semiAvv=lato(altro(l)).semi;
  const puo=colpiPossibili(l);
  SC.innerHTML=`

    <div class="pannello${G.modalita==="solo"&&l==="O"?" ia-nascosta":""}">
