function eseguiColpo(l, riservaCard, bersaglio){
  const L=lato(l);
  L.riserva=L.riserva.filter(x=>x.id!==riservaCard.id);
  const proprietario = lato("P").semi.includes(bersaglio.seme) ? "P":"O";
  G.piatto=G.piatto.filter(x=>x.id!==bersaglio.id);
  lato(proprietario).scarti.push(bersaglio);
  G.piatto.push(riservaCard);
  G.colpi.passaggi=0;
  G.ultimaGiocata=`COLPO DI SCENA! ${nomeLato(l)} sostituisce ${nomeCarta(bersaglio)} con ${nomeCarta(riservaCard)}.`;
  vaiNarrazione(riservaCard,"presa","",()=>{
    G.colpi.attore=altro(l); G.attore=G.colpi.attore;
    if(colpiPossibili(G.attore)){ G.fase="colpi"; velo(G.attore,render); }
    else if(colpiPossibili(l)){ G.colpi.attore=l; G.attore=l; G.colpi.passaggi=1; G.fase="colpi"; velo(l,render); }
    else conteggioDefinitivo();
  }, `<b>COLPO DI SCENA.</b> Narra come le cose non fossero come apparivano: ${nomeCarta(bersaglio)} esce dalla storia, ${nomeCarta(riservaCard)} ne prende il posto. Un volto che cade, una verità che riemerge, una carta che qualcuno teneva da parte da sempre.`, l);
}
function conteggioDefinitivo(){
  chiudiScena();
  G.colpi=null;
  G.fase="finale"; render();
}

function rFinale(){
  const vp=G.scene.filter(s=>s&&s.vincitore==="P").length;
  const vo=G.scene.filter(s=>s&&s.vincitore==="O").length;
  function scopeVal(l){
    const L=lato(l);
    return L.scope.filter(c=>!c.esposta&&!c.tappata).length*2 + L.scope.filter(c=>!c.esposta&&c.tappata).length*1;
  }
  function punti(l){ return scopeVal(l) + lato(l).prese.length }
  // vittoria del piatto = esito esterno della missione (con tie-break: scope, poi prese)
  const rec5=G.scene[4];
  let piattoP;
  if(rec5.totP!==rec5.totO) piattoP = rec5.totP>rec5.totO;
  else if(scopeVal("P")!==scopeVal("O")) piattoP = scopeVal("P")>scopeVal("O");
  else piattoP = lato("P").prese.length>=lato("O").prese.length;
  const pP=punti("P"), pO=punti("O");
  const puntiP = pP>pO, pari = pP===pO;
  const OUTCOME = piattoP
    ? (puntiP||pari ? ["VITTORIA TOTALE","successo pieno, netto — la missione riesce e il viaggio li premia"]
                    : ["PER IL ROTTO DELLA CUFFIA","l'obiettivo è raggiunto, ma pagando un prezzo"])
    : (puntiP ? ["SCONFITTA CON ASPETTI POSITIVI","l'obiettivo fallisce, ma qualcosa è salvato o imparato"]
              : ["DISFATTA TOTALE","fallimento completo"]);
  const tf=totaleSeme("fiori"), tq=totaleSeme("quadri");
  const oppNat = tq>tf
    ? "♦ È stata soprattutto l'opposizione organizzata a ostacolarli: un nemico con un volto, un piano, una volontà."
    : tf>tq
    ? "♣ Sono stati soprattutto il caos e la sfortuna a ostacolarli: il mondo stesso, non un nemico preciso."
    : "Nemici e caos in egual misura: il mondo era contro di loro, ma non sempre per gli stessi motivi.";
  const su=G.scene.filter(s=>s&&s.rapporto==="su").length;
  const giu=G.scene.filter(s=>s&&s.rapporto==="giu").length;
  const rapp = su>giu
    ? `Lungo la strada si sono avvicinati: ${su} scene di connessione contro ${giu} di distanza. Non sono più quelli della partenza.`
    : giu>su
    ? `Lungo la strada si sono allontanati: ${giu} scene di conflitto contro ${su} di connessione. Qualunque sia l'esito — a quale prezzo?`
    : `Connessione e conflitto in equilibrio (${su} a ${giu}): il rapporto resta una domanda aperta.`;
  SC.innerHTML=`
    <h2 class="ts">Fine della corsa</h2>
    <div class="cartellone">
      <div class="grande">${OUTCOME[0]}</div>
      <div class="sc">${OUTCOME[1]}</div>
    </div>
    <div class="riga2">
      <div class="pannello" style="text-align:center"><span class="etichetta">Piatto finale — la missione</span>
        <div class="punti-big">${rec5.totP} — ${rec5.totO}</div>
        <div class="contatori">♥+♠ / ♦+♣ · ${piattoP?"missione riuscita":"missione fallita"}</div></div>
      <div class="pannello" style="text-align:center"><span class="etichetta">Punti — scope + prese</span>
        <div class="punti-big">${pP} — ${pO}</div>
        <div class="contatori">scope intatte ×2, spese ×1, più le prese · scene vinte ${vp}/${vo}</div></div>
    </div>
    <div class="pannello">
      <span class="etichetta">L'ultima scena</span>
      <div class="lettura">${LETT_DOM[rec5.dominante]}</div>
      <div class="lettura">${oppNat}</div>
    </div>
    <div class="pannello">
      <span class="etichetta">Il rapporto</span>
      <div class="lettura">${rapp}</div>
    </div>
    ${G.nGiocatori>2?`<div class="pannello">
      <span class="etichetta">Scope per giocatore</span>
      <div class="contatori" style="font-size:13px">
        ${latoDiviso("P")?`♠ ${G.giocatori.picche||"Picche"}: ${G.scopeGiocatore.picche} · ♥ ${G.giocatori.cuori||"Cuori"}: ${G.scopeGiocatore.cuori}`:""}
        ${latoDiviso("O")?`<br>♦ ${G.giocatori.quadri||"Quadri"}: ${G.scopeGiocatore.quadri} · ♣ ${G.giocatori.fiori||"Fiori"}: ${G.scopeGiocatore.fiori}`:""}
      </div>
      ${latoDiviso("P")?`<div class="lettura">${
        G.scopeGiocatore.picche>G.scopeGiocatore.cuori
          ? `Nell'epilogo, tra i due protagonisti, l'ultima parola spetta a <b>${G.giocatori.picche||"♠"}</b> (più scope).`
          : G.scopeGiocatore.cuori>G.scopeGiocatore.picche
          ? `Nell'epilogo, tra i due protagonisti, l'ultima parola spetta a <b>${G.giocatori.cuori||"♥"}</b> (più scope).`
          : `Scope in parità tra i due protagonisti: l'ultima parola è condivisa.`}</div>`:""}
    </div>`:""}
    <div class="pannello">
      <span class="etichetta">Epilogo — come hai vinto, quanto hai perso, cosa è cambiato</span>
      <textarea id="f-epilogo" rows="4">${G.epilogo}</textarea>
    </div>
    <div style="display:flex;gap:10px">
      <button class="secondaria" style="flex:1" id="f-diario">Rileggi il diario</button>
      <button class="azione" style="flex:1" id="f-nuova">Nuovo viaggio</button>
    </div>`;
  document.getElementById("f-epilogo").addEventListener("input",e=>G.epilogo=e.target.value);
  document.getElementById("f-diario").addEventListener("click",apriDiario);
  document.getElementById("f-nuova").addEventListener("click",()=>{
    G=nuovaPartita();
    if(rete.attiva){ G.modalita="online"; G.hostLato=rete.mioLato; G.fase="setup"; }
    render();
  });
}

    <div class="es">"Kai minaccia il teste con informazioni false per farlo parlare — tecnicamente illegale, sicuramente efficace."</div>
    <h3>Il peccato del Jolly</h3>
    Una <b>scopa</b> col Jolly lascia un <i>peccato latente</i>. In una scena successiva l'avversario può farlo emergere: elimina il Jolly dal gioco, ottiene <b>5 punti</b>, e narra come il passato torna a chiedere il conto.
    <h3>Counter</h3>
    Se l'avversario ha il proprio Jolly in mano può smascherare la mossa (facoltativo): prende <b>tutte le carte del piatto</b> come presa, ed entrambi i Jolly escono dal gioco.
    <h3>Piatto vuoto</h3>
    Jolly giocato su piatto vuoto: nessuna presa, finisce tra le scope come <b>risorsa fallita</b>, esposta all'avversario.`},
  pitch:{titolo:"Risorse del pitch",html:`
    <h3>Le dieci domande (9.5–9.6)</h3>
    Sei poste dall'Opposizione ai Protagonisti (cosa si detestano, perché tengono all'obiettivo, gli assi nella manica — ♠ e ♥) e quattro poste dai Protagonisti all'Opposizione (mezzi temibili e motivazioni ♦, catastrofi e crepe nell'alleanza ♣). Le risposte vengono scritte e <b>diventano risorse di gioco</b>.
    <h3>La prima difficoltà (9.7)</h3>
    Dopo le domande, tutti rispondono insieme: <b>che cosa vi impedisce di raggiungere l'obiettivo subito?</b> La risposta non è spuntabile: appartiene al tavolo e inquadra la <b>Scena 1</b>.
    <h3>Uso meccanico (9.8)</h3>
    Dopo una presa normale si può <b>spuntare la risposta corrispondente al seme della carta di presa</b>: la presa diventa una <b>scopa vera</b> e le carte rimaste nel piatto finiscono tra le prese di chi spunta. Condizioni:
    <ul><li>la risposta deve entrare esplicitamente nella narrazione (scena, rivelazione o flashback)</li>
    <li>ogni risposta si usa una volta sola; massimo <b>una spinta per seme per lato</b></li>
    <li><b>non si può usare nell'ultima scena</b>: nella Risoluzione il piatto si svuota solo con una scopa vera</li></ul>
    <div class="es">"Jorge è stato ucciso al posto di Skunk: la spia era lui, e Frank non lo sa." A scena 3 il giocatore Fiori-Quadri prende con una carta di Fiori e la spunta con un flashback, l'ultima telefonata di Jorge, l'addio di chi sa che non arriverà a domani: la presa diventa una scopa e il piatto si svuota nelle sue prese.</div>`},
  tavoli:{titolo:"3–4 giocatori",html:`
    <h3>Strutture (7.2–7.3)</h3>
    Esistono sempre <b>due mazzi e due mani</b>. In 3 giocatori: uno controlla ♠, uno ♥ (mazzo e mano dei Protagonisti condivisi), uno ♦♣. In 4: ogni seme a un giocatore.
    <h3>Controllo della mano condivisa</h3>
    A inizio scena la mano è gestita dal giocatore con la <b>maggioranza di carte del proprio seme</b> nella mano del suo lato; il controllo vale per tutta la scena. In parità, gioca chi <b>non</b> ha controllato la mano nella scena precedente. In 3 giocatori, in alternativa, il controllo può <b>alternarsi di scena in scena</b>.
    <h3>Epilogo</h3>
    Tra i due protagonisti, l'ultima parola spetta a chi ha realizzato <b>più scope</b>.`},
  scena5:{titolo:"La quinta scena",html:`
    <h3>Mano finale estesa (23.1)</h3>
    Se un giocatore ha tra <b>5 e 7 carte</b> rimanenti nel mazzo: le prende tutte, sceglie le 4 con cui giocherà, le altre vanno da parte come <b>riserva</b>.
    <h3>Figure nel piatto (23.2)</h3>
    Le figure rimaste nel piatto all'inizio dell'ultima scena vengono rimosse: l'avversario del proprietario narra la <b>neutralizzazione</b> di quel PNG, e ognuna conta come <b>una scopa</b> per lui.
    <h3>Colpi di scena finali (24)</h3>
    Dopo il <b>primo conteggio</b> si narra l'esito apparente. Poi chi ha carte in riserva può sostituire <b>una carta avversaria nel piatto</b> con una propria di <b>valore pari o inferiore</b>, narrando come le cose non fossero come apparivano. Ci si alterna finché nessuno può o vuole più farne. Infine si rifà il conteggio: è quello definitivo.
    <h3>Conteggio finale e outcome (25–26)</h3>
    Il piatto finale (♥+♠ vs ♦+♣) decide l'<b>esito esterno della missione</b>; in parità: tie-break su scope (non spese 2, spese 1, alleati sacrificati inclusi) poi prese. Incrociando piatto e punti complessivi (scope + prese):
    <table><tr><th>Piatto</th><th>Punti</th><th>Esito</th></tr>
    <tr><td>Vinto</td><td>Vinti</td><td><b>Vittoria totale</b> — successo pieno, netto</td></tr>
    <tr><td>Vinto</td><td>Persi</td><td><b>Per il rotto della cuffia</b> — obiettivo raggiunto pagando un prezzo</td></tr>
    <tr><td>Perso</td><td>Vinti</td><td><b>Sconfitta con aspetti positivi</b> — qualcosa è salvato o imparato</td></tr>
    <tr><td>Perso</td><td>Persi</td><td><b>Disfatta totale</b> — fallimento completo</td></tr></table>`}

/* ================= DIARIO ================= */
function apriDiario(){
  const dp=document.getElementById("diarioPitch");
  dp.innerHTML = (G.pers.A.nome||G.pers.B.nome||G.missione) ? `
    <div class="banner" style="margin-bottom:10px">
      <b>${G.pers.A.nome||"P1"} ♠ & ${G.pers.B.nome||"P2"} ♥</b>${G.tono?` · ${G.tono}`:""}
      ${G.missione?`<br>${G.missione}`:""}
    </div>` : "";
  const svg=document.getElementById("strada");
  const W=700,H=240,x0=60,dx=(W-2*x0)/4,yC=H/2,passo=34;
  let y=yC; const punti=[[x0-dx*0.6,yC]]; const ys=[];
  G.scene.forEach(s=>{
    if(s&&s.rapporto==="su")y-=passo; else if(s&&s.rapporto==="giu")y+=passo;
    y=Math.max(28,Math.min(H-28,y)); ys.push(y);
    punti.push([x0+dx*ys.length-dx, y]);
  });
  // ricostruisci coordinate corrette
  punti.length=1; let yy=yC;
  G.scene.forEach((s,i)=>{
    if(s&&s.rapporto==="su")yy-=passo; else if(s&&s.rapporto==="giu")yy+=passo;
    yy=Math.max(28,Math.min(H-28,yy)); ys[i]=yy;
    punti.push([x0+dx*i,yy]);
  });
  const d=punti.map((p,i)=>(i?"L":"M")+p[0]+","+p[1]).join(" ");
  let cerchi="";
  G.scene.forEach((s,i)=>{
    const cx=x0+dx*i, cy=ys[i];
    const col=s&&s.rapporto==="su"?"var(--cuori)":s&&s.rapporto==="giu"?"var(--picche)":"var(--bordo)";
    cerchi+=`<circle cx="${cx}" cy="${cy}" r="14" fill="var(--notte)" stroke="${col}" stroke-width="3"/>
      <text x="${cx}" y="${cy+5}" text-anchor="middle" font-family="Oswald,sans-serif" font-size="14" font-weight="600" fill="${s&&s.rapporto?col:"var(--grigio)"}">${i+1}</text>
      <text x="${cx}" y="${cy+(s&&s.rapporto==="giu"?34:-24)}" text-anchor="middle" font-family="IBM Plex Mono,monospace" font-size="9" letter-spacing="1" fill="var(--grigio)">${((s&&s.titolo)||FASI_NARR[i]).toUpperCase().slice(0,18)}</text>`;
  });
  svg.innerHTML=`
    <line x1="0" y1="${yC}" x2="${W}" y2="${yC}" stroke="var(--bordo)" stroke-width="1" stroke-dasharray="3 5"/>
    <path d="${d}" fill="none" stroke="#0c0d10" stroke-width="22" stroke-linejoin="round" stroke-linecap="round"/>
    <path d="${d}" fill="none" stroke="var(--mezzeria)" stroke-width="3" stroke-dasharray="14 12" stroke-linejoin="round" stroke-linecap="round"/>
    ${cerchi}`;
  const cont=document.getElementById("diarioVoci");
  cont.innerHTML="";
  G.scene.forEach((s,i)=>{
    const div=document.createElement("div");
    div.className="diario-voce "+(s&&s.rapporto==="su"?"su":s&&s.rapporto==="giu"?"giu":"");
    const titolo=(s&&s.titolo)||FASI_NARR[i];
    const r=s&&s.rapporto?LETT_RAPP[s.rapporto]:"Scena non ancora giocata.";
    const dom=s&&s.dominante?" · "+LETT_DOM[s.dominante]:"";
    const vinc=s&&s.vincitore?` — posta ${s.vincitore==="P"?"raggiunta":s.vincitore==="O"?"fallita":"sospesa"}`:"";
    const ria=s&&s.riassunto?`<span style="margin-top:4px;font-style:italic;color:var(--osso)">«${s.riassunto}»</span>`:"";
    div.innerHTML=`<div class="n">${i+1}</div><div class="testo"><b>${titolo}${vinc}</b><span>${r}${dom}</span>${ria}</div>`;
    cont.appendChild(div);
  });
  document.getElementById("ovDiario").classList.add("attivo");
}

let schedaTab="A";
function apriSchede(tab){
  if(tab) schedaTab=tab;
  const nA=G.pers.A.nome||"Protagonista ♠", nB=G.pers.B.nome||"Protagonista ♥";
  const vuoto=`<p class="sotto">Niente da mostrare qui: si compila nella creazione della partita.</p>`;
  // blocco domanda+risposta del pitch, filtrato per seme
  const qa=(semi)=>G.pitch.map((x,i)=>({x,i})).filter(({x})=>semi.includes(x.seme) && x.risposta)
    .map(({x,i})=>`<div style="margin-top:10px">
      <span class="etichetta" style="margin-bottom:2px">${SIMBOLI[x.seme]} ${PITCH_TEMPLATE[i].q(G.pers.A.nome||"P1",G.pers.B.nome||"P2")}</span>
      <div style="font-size:13.5px">${x.risposta}${x.usata?` <span style="color:var(--grigio);font-style:italic">· risorsa già spesa</span>`:""}</div>
    </div>`).join("");
  const cartello=(grande,sc)=>`<div class="cartellone"><div class="grande">${grande}</div><div class="sc">${sc}</div></div>`;
  const TABS={
    A:{label:`♠ ${G.pers.A.nome||"Picche"}`, html:()=>{
      const corpo=(G.pers.A.desc?`<div class="pannello"><span class="etichetta">Chi è</span><div style="font-size:14px">${G.pers.A.desc}</div></div>`:"")+qa(["picche"]);
      return cartello(nA,"Protagonista · la linea dura ♠")+(corpo||vuoto);
    }},
    B:{label:`♥ ${G.pers.B.nome||"Cuori"}`, html:()=>{
      const corpo=(G.pers.B.desc?`<div class="pannello"><span class="etichetta">Chi è</span><div style="font-size:14px">${G.pers.B.desc}</div></div>`:"")+qa(["cuori"]);
      return cartello(nB,"Protagonista · la connessione ♥")+(corpo||vuoto);
    }},
    O:{label:"♦♣ Opposizione", html:()=>{
      const corpo=(G.nemici?`<div class="pannello"><span class="etichetta">♦ I nemici organizzati</span><div style="font-size:14px">${G.nemici}</div></div>`:"")
        +(G.caos?`<div class="pannello"><span class="etichetta">♣ Il caos</span><div style="font-size:14px">${G.caos}</div></div>`:"")
        +qa(["quadri","fiori"]);
      return cartello("L'Opposizione","nemici ♦ · caos ♣")+(corpo||vuoto);
    }},
    M:{label:"Missione", html:()=>{
      const corpo=(G.missione?`<div class="pannello"><span class="etichetta">L'obiettivo del viaggio — la posta</span><div style="font-size:14.5px">${G.missione}</div></div>`:"")
        +(G.primaDiff?`<div class="pannello"><span class="etichetta">Prima difficoltà — Scena 1</span><div style="font-size:13.5px">${G.primaDiff}</div></div>`:"");
      return cartello(`${nA} & ${nB}`,`${G.tono||"tono libero"} · cinque scene`)+(corpo||vuoto);
    }},
    P:{label:"PNG", html:()=>{
      const figs=G.figureComprate||[], narr=G.pngNarr||[];
      const intro=cartello("PNG","registro dei personaggi non giocanti");
      const protag=seme=>(seme==="cuori"||seme==="picche");
      const latoSeme=seme=>protag(seme)?"Protagonisti ♥♠":"Opposizione ♦♣";
      const clsLato=seme=>protag(seme)?"png-prot":"png-opp";
      if(!figs.length && !narr.length)
        return intro+`<p class="sotto">Nessun PNG ancora. Le figure (Fante, Dama, Re) si comprano al mercato; i PNG narrativi si creano dal pulsante "Crea PNG" durante la narrazione.</p>`;
      let html=intro;
      if(figs.length){
        html+=`<div class="etichetta" style="margin:14px 0 6px">Figure acquistate al mercato</div>`;
        html+=figs.map(e=>{
          const f=FIGURE[e[0]], seme=e.slice(1), meta=(G.png&&G.png[e])||{};
          return `<div class="pannello ${clsLato(seme)}"><span class="etichetta">${SIMBOLI[seme]} ${f.nome} di ${seme} · ${latoSeme(seme)}</span>
            <div style="font-family:'Oswald',sans-serif;font-size:16px;letter-spacing:.5px;color:var(--faro)">${meta.nome||f.titolo}</div>
            ${meta.desc?`<div style="font-size:13.5px;margin-top:3px">${meta.desc}</div>`:""}
            <div style="font-size:12.5px;color:var(--grigio);margin-top:5px"><b>${f.nome} — ${f.titolo}.</b> ${f.eff}</div></div>`;
        }).join("");
      }
      if(narr.length){
        html+=`<div class="etichetta" style="margin:14px 0 6px">PNG narrativi</div>`;
        html+=narr.map(p=>`<div class="pannello ${clsLato(p.seme)}"><span class="etichetta">${SIMBOLI[p.seme]} ${p.seme} · ${latoSeme(p.seme)}${p.scena!=null?` · scena ${p.scena+1}`:""}</span>
          <div style="font-family:'Oswald',sans-serif;font-size:16px;letter-spacing:.5px;color:var(--faro)">${p.nome||"(senza nome)"}</div>
          ${p.desc?`<div style="font-size:13.5px;margin-top:3px">${p.desc}</div>`:""}</div>`).join("");
      }
      return html;
    }}
  };
  if(!TABS[schedaTab]) schedaTab="A";
  const nav=document.getElementById("schedeNav");
  nav.innerHTML=Object.entries(TABS).map(([k,t])=>`<button data-tk="${k}" class="${k===schedaTab?"attivo":""}">${t.label}</button>`).join("");
  nav.querySelectorAll("button").forEach(b=>b.addEventListener("click",()=>apriSchede(b.dataset.tk)));
  document.getElementById("schedeCorpo").innerHTML=TABS[schedaTab].html();
  document.getElementById("ovSchede").classList.add("attivo");
  document.querySelector("#ovSchede .scatola").scrollTop=0;
}

/* ================= MODALITÀ SOLO — CLAUDE GIOCA L'OPPOSIZIONE ================= */
let iaBusy=false, iaNarrTesto=null;
function iaBadge(on){ const b=document.getElementById("iaBadge"); if(b) b.style.display=on?"block":"none" }

const REGOLE_IA=`Sei l'OPPOSIZIONE (i nemici ♦ Quadri e il caos ♣ Fiori) in Frenemies on the Road, gioco di carte narrativo su regole tipo Scopa, ambientazione road movie notturno. Regole essenziali: una carta prende dal piatto una carta di pari valore, oppure un gruppo di carte la cui somma è pari al suo valore; se la presa svuota il piatto è SCOPA. A fine scena si sommano i valori delle carte rimaste nel piatto: ♦ e ♣ contano per te, ♥ e ♠ per i Protagonisti; vince la scena il totale più alto, e il piatto resta sul tavolo per la scena dopo. La partita si decide sul piatto della quinta scena. Le carte prese valgono punti (al mercato e nel conteggio finale); le scope valgono di più. Strategia: prendi quando puoi, soprattutto carte alte dei semi avversari; preferisci lasciare nel piatto carte alte dei TUOI semi; nell'asta una carta alta vince l'iniziativa ma esce dalla tua strategia di round. Quando narri, sei il mondo che rema contro: sicari pazienti, poliziotti corrotti, tempesta nel deserto.`;

function iaContesto(){
  const rec=G.scene[G.scena]||{};
  const O=lato("O"), P=lato("P");
  const pitchO=G.pitch.slice(6).map(p=>`${p.usata?"[USATA] ":""}${SIMBOLI[p.seme]} ${p.risposta}`).filter(s=>s.trim().length>3).join(" | ");
  return `PARTITA: scena ${G.scena+1}/5 (${FASI_NARR[G.scena]||""}). Missione dei Protagonisti: ${G.missione||"-"}. Titolo della scena: ${rec.titolo||"-"}. Posta: ${rec.posta||"-"}.
Nemici ♦: ${G.nemici||"-"}. Caos ♣: ${G.caos||"-"}. Le tue risorse del pitch: ${pitchO||"-"}.
PIATTO: ${G.piatto.length?G.piatto.map(c=>nomeCarta(c)).join(", "):"vuoto"}.
LA TUA MANO: ${O.mano.map(c=>nomeCarta(c)).join(", ")||"vuota"}.
Tue prese ${O.prese.length}, tue scope ${O.scope.length} · prese avversarie ${P.prese.length}, scope avversarie ${P.scope.length}.
Totali del piatto ora: Protagonisti ${totaleProt()}, Opposizione ${totaleOpp()}.`;
}

async function chiamaClaude(istruzioni){
  try{
    iaBadge(true);
    const r=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514", max_tokens:1000,
        messages:[{role:"user",content:REGOLE_IA+"\n\n"+iaContesto()+"\n\n"+istruzioni+"\nRispondi SOLO con un oggetto JSON valido, senza testo prima o dopo e senza markdown."}]})});
    const d=await r.json();
    const testo=(d.content||[]).map(x=>x.text||"").join("").replace(/```json|```/g,"").trim();
    return JSON.parse(testo);
  }catch(e){ console.warn("IA non raggiungibile, mossa automatica:",e.message); return null }
  finally{ iaBadge(false) }
}

function clicca(el){ if(el) el.dispatchEvent(new Event("click",{bubbles:true})) }

function iaScheduler(){
  if(G.modalita!=="solo"||iaBusy) return;
  if(document.getElementById("ovModale").classList.contains("attivo")){
    if(G.attore==="O") clicca(document.getElementById("fanteOk")||document.getElementById("reNo"));
    return;
  }
  const f=G.fase;
  if(f==="asta"&&G.attore==="O") iaAsta();
  else if(f==="apertura"&&G.attore==="O") iaApertura();
  else if(f==="turno"&&G.attore==="O") iaTurno();
  else if(f==="counter"&&G.pendingJolly&&altro(G.pendingJolly.attore)==="O") iaCounter();
  else if(f==="narrazione"&&(G.narrLato||G.attore)==="O") iaNarrazione();
  else if(f==="mercato") iaMercato();
  else if(f==="mano_estesa"&&G.attore==="O") iaManoEstesa();
  else if(f==="colpi"&&G.attore==="O") iaColpi();
}

async function iaAsta(){
  iaBusy=true;
  const carte=[...document.querySelectorAll("#manoAsta .carta")].filter(x=>!x.classList.contains("jolly"));
  const op=carte.map((el,i)=>{const c=lato("O").mano.find(x=>x.id==el.dataset.id);return `${i}: gioca coperto ${nomeCarta(c)}`});
  const r=await chiamaClaude(`ASTA PER L'INIZIATIVA: la carta più alta vince e apre la scena; la carta del vincitore sarà la sua ultima giocata, quella del perdente torna in mano.\nOPZIONI:\n${op.join("\n")}\nJSON: {"scelta": <numero>}`);
  const i=(r&&Number.isInteger(r.scelta)&&carte[r.scelta])?r.scelta:Math.floor(Math.random()*carte.length);
  iaBusy=false;
  clicca(carte[i]); clicca(document.getElementById("confAsta"));
}

async function iaApertura(){
  iaBusy=true;
  const r=await chiamaClaude(`Hai vinto l'iniziativa: APRI LA SCENA. Scegli un titolo evocativo (2-4 parole) e dichiara la posta (cosa succede se va male per i Protagonisti), coerenti con la missione e con la fase narrativa.\nJSON: {"titolo":"...","posta":"..."}`);
  const ti=document.getElementById("a-titolo"), po=document.getElementById("a-posta");
  if(ti) ti.value=(r&&r.titolo)||FASI_NARR[G.scena];
  if(po) po.value=(r&&r.posta)||FASI_FUNZ[G.scena];
  iaBusy=false;
  clicca(document.getElementById("a-via"));
}

async function iaTurno(){
  iaBusy=true;
  const g=carteGiocabili("O");
  const ops=[];
  for(const c of g.carte){
    if(c.jolly){
      if(G.piatto.length===0){
        ops.push({desc:"gioca il JOLLY su piatto vuoto: il piano fallisce, il Jolly finisce esposto tra le tue scope a valore 0",
          esegui:()=>{ rimuoviDaMano("O",c,false); c.esposta=true; lato("O").scope.push(c);
            G.ultimaGiocata=`${nomeLato("O")} gioca il Jolly su piatto vuoto: il piano scorretto fallisce senza alcun vantaggio.`;
            vaiNarrazione(c,"piatto","",null,`<b>Il piano fallisce.</b> Il tentativo scorretto non trova appigli. Il Jolly resta esposto tra le scope dell'Opposizione.`);}});
      }else{
        for(let v=1;v<=10;v++) combosPresa(v).forEach(cmb=>ops.push({
          desc:`JOLLY dichiarato come ${v}: prendi ${cmb.map(x=>nomeCarta(x)).join(" + ")}${cmb.length===G.piatto.length?" — SCOPA (ma lascia un peccato latente)":""}. L'avversario potrà fare counter se ha il suo Jolly`,
          esegui:()=>{ G.pendingJolly={attore:"O",carta:c,valore:v,combo:cmb}; G.fase="counter"; velo("P",render); }}));
      }
    }else{
      combosPresa(c.val).forEach(cmb=>ops.push({
        desc:`con ${nomeCarta(c)} prendi ${cmb.map(x=>nomeCarta(x)).join(" + ")}${cmb.length===G.piatto.length?" — SCOPA":""}`,
        esegui:()=>giocaCarta(c,cmb,g.daAsta)}));
      ops.push({desc:`gioca ${nomeCarta(c)} nel piatto (nessuna presa)`, esegui:()=>giocaCarta(c,null,g.daAsta)});
    }
  }
  const r=await chiamaClaude(`È IL TUO TURNO. ${g.daAsta?"Questa è la tua ultima giocata: la carta dell'asta.":""}\nOPZIONI:\n${ops.map((o,i)=>i+": "+o.desc).join("\n")}\nJSON: {"scelta": <numero>}`);
  let i=(r&&Number.isInteger(r.scelta)&&ops[r.scelta])?r.scelta:-1;
  if(i<0){ i=ops.findIndex(o=>o.desc.includes("prendi")); if(i<0) i=Math.floor(Math.random()*ops.length); }
  iaBusy=false;
  ops[i].esegui();
}

async function iaCounter(){
  iaBusy=true;
  const pj=G.pendingJolly;
  const ha=lato("O").mano.some(c=>c.jolly);
  let counter=false;
  if(ha){
    const r=await chiamaClaude(`L'avversario gioca il JOLLY come ${pj.valore} per prendere ${pj.combo.map(x=>nomeCarta(x)).join(" + ")}. Hai il tuo Jolly in mano: puoi fare COUNTER (smascheri la mossa, prendi TUTTE le ${G.piatto.length} carte del piatto, entrambi i Jolly escono dal gioco) oppure lasciar correre e tenerti il Jolly.\nJSON: {"counter": true|false}`);
    counter=!!(r&&r.counter);
  }
  iaBusy=false;
  risolviJolly(counter);
}

async function iaNarrazione(){
  if(document.getElementById("iaNarr")) return;
  iaBusy=true;
  const spinte=spinteDisponibili("O");
  const haBoost=G.narr&&G.narr.boostCard&&spinte.length>0;
  if(iaNarrTesto===null){
    const r=await chiamaClaude(`Hai appena agito: "${G.ultimaGiocata||""}". Narra la mossa in 1-2 frasi, in italiano, dal punto di vista dell'Opposizione.${haBoost?`\nPuoi anche SPUNTARE la risorsa del pitch corrispondente al seme della carta con cui hai preso, per trasformare questa presa in SCOPA vera: le carte rimaste nel piatto finiscono tra le tue prese. Risorse disponibili:\n${spinte.map(({p,i},k)=>k+": "+SIMBOLI[p.seme]+" "+p.risposta).join("\n")}\nUsala solo se la risorsa entra davvero nella narrazione: è una svolta, non un bonus.`:""}\nJSON: {"narrazione":"...", "spinta": ${haBoost?"<numero> oppure null":"null"}}`);
    iaNarrTesto=(r&&r.narrazione)||"L'Opposizione stringe il cerchio, senza fretta.";
    if(haBoost&&r&&Number.isInteger(r.spinta)&&spinte[r.spinta]){
      iaBusy=false;
      clicca(SC.querySelector(`button[data-spinta="${spinte[r.spinta].i}"]`));
      return;  // il re-render della narrazione richiamerà l'iniezione
    }
  }
  const pann=SC.querySelector(".lettura");
  if(pann&&!document.getElementById("iaNarr")){
    const div=document.createElement("div");
    div.id="iaNarr"; div.className="lettura";
    div.style.cssText="margin-top:8px;border-left:3px solid var(--mezzeria);padding-left:10px";
    div.textContent="🃏 Claude: «"+iaNarrTesto+"»";
    pann.parentElement.appendChild(div);
  }
  iaNarrTesto=null; iaBusy=false;
}

async function iaMercato(){
  if(document.getElementById("iaMercatoFatto")) return;
  iaBusy=true;
  const fine=document.getElementById("m-fine"); if(fine) fine.disabled=true;
  const btns=[...document.querySelectorAll('button[data-l="O"][data-f]')].filter(b=>!b.disabled);
  if(btns.length){
    const op=btns.map((b,i)=>`${i}: ${FIGURE[b.dataset.f].nome} di ${b.dataset.s} ${SIMBOLI[b.dataset.s]} (costo ${FIGURE[b.dataset.f].costo})`);
    const r=await chiamaClaude(`MERCATO: hai ${puntiMercato("O")} punti (il pagamento spende prima i bonus, poi le carte prese, poi tappa le scope). Le figure entrano nel tuo mazzo. Effetti: Fante = guarda e riordina le prime 4 carte del mazzo; Dama = l'avversario scarta una carta a caso; Re = recupera una carta dagli scarti. Ogni figura esiste in copia unica.\nOPZIONI (puoi sceglierne più d'una o nessuna):\n${op.join("\n")}\nJSON: {"acquisti": [numeri] }`);
    if(r&&Array.isArray(r.acquisti)) for(const i of r.acquisti){
      const b=btns[i];
      if(b&&document.contains(b)&&!b.disabled){
        const f=b.dataset.f, s=b.dataset.s;
        acquistaFigura("O", f, s, FIGURE[f].titolo, "", b);   // PNG-figura dell'IA: nome di default, niente modale
      }
    }
  }
  const m=document.createElement("span"); m.id="iaMercatoFatto"; m.style.display="none"; SC.appendChild(m);
  if(fine) fine.disabled=false;
  iaBusy=false;
}

async function iaManoEstesa(){
  iaBusy=true;
  const btn=document.getElementById("estOk");
  if(btn&&!btn.disabled){ iaBusy=false; clicca(btn); return }
  const carte=[...document.querySelectorAll("#estCarte .carta")];
  const op=carte.map((el,i)=>{const c=lato("O").mazzo.find(x=>x.id==el.dataset.id);return `${i}: ${c?nomeCarta(c):"?"}`});
  const r=await chiamaClaude(`MANO FINALE: prendi tutte le carte rimaste, ne tieni 4 per l'ultima scena; le altre vanno in riserva per i colpi di scena (lì servono carte BASSE dei tuoi semi, per sostituire carte avversarie di valore pari o superiore nel piatto).\nCARTE:\n${op.join("\n")}\nJSON: {"tieni": [quattro numeri]}`);
  let sel=(r&&Array.isArray(r.tieni)&&r.tieni.length===4&&r.tieni.every(i=>carte[i]))?r.tieni:[0,1,2,3];
  iaBusy=false;
  sel.forEach(i=>clicca(carte[i]));
  clicca(document.getElementById("estOk"));
}

async function iaColpi(){
  iaBusy=true;
  const semiAvv=lato("P").semi, R=lato("O").riserva;
  const ops=[];
  for(const r of R) G.piatto.filter(c=>semiAvv.includes(c.seme)&&c.val>=r.val&&!c.jolly)
    .forEach(b=>ops.push({desc:`sostituisci ${nomeCarta(b)} (dell'avversario, nel piatto) con ${nomeCarta(r)} (tua riserva)`, esegui:()=>eseguiColpo("O",r,b)}));
  let scelta=-1;
  if(ops.length){
    const r=await chiamaClaude(`COLPI DI SCENA dopo il primo conteggio (Protagonisti ${totaleProt()}, Opposizione ${totaleOpp()}). Puoi sostituire una carta avversaria nel piatto con una tua di valore pari o inferiore, narrando il ribaltamento, oppure passare.\nOPZIONI:\n${ops.map((o,i)=>i+": "+o.desc).join("\n")}\n${ops.length}: PASSO\nJSON: {"scelta": <numero>}`);
    if(r&&Number.isInteger(r.scelta)&&r.scelta>=0&&r.scelta<ops.length) scelta=r.scelta;
    else if(!(r&&r.scelta===ops.length)&&totaleOpp()<totaleProt()&&ops.length) scelta=0;
  }
  iaBusy=false;
  if(scelta>=0) ops[scelta].esegui();
  else clicca(document.getElementById("colpoPasso"));
}

/* ================= AVVIO ================= */
render();
</script>
